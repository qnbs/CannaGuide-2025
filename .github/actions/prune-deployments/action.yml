name: Prune GitHub deployments
description: >-
    Delete stale GitHub deployment records via the Deployments API, keeping the
    newest N per environment (default 3). Safe to run after every deploy workflow.

inputs:
    keep_count:
        description: Number of recent deployments to keep per environment
        required: false
        default: '3'
    dry_run:
        description: List prune candidates only (no deletes)
        required: false
        default: 'false'

runs:
    using: composite
    steps:
        - name: Prune stale GitHub deployments
          uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
          with:
              script: |
                  const keep = Math.max(1, parseInt('${{ inputs.keep_count }}' || '3', 10));
                  const dryRun = String('${{ inputs.dry_run }}').toLowerCase() === 'true';
                  const owner = context.repo.owner;
                  const repo = context.repo.repo;

                  if (dryRun) {
                    core.notice('dry_run=true — reporting candidates only');
                  }

                  const deployments = await github.paginate(
                    github.rest.repos.listDeployments,
                    { owner, repo, per_page: 100 }
                  );

                  const byEnv = {};
                  for (const d of deployments) {
                    const env = d.environment || 'unknown';
                    if (!byEnv[env]) byEnv[env] = [];
                    byEnv[env].push(d);
                  }

                  let deleted = 0;
                  let failed = 0;

                  for (const [env, deps] of Object.entries(byEnv)) {
                    deps.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                    const toDelete = deps.slice(keep);

                    if (toDelete.length === 0) {
                      core.info(`[${env}] ${deps.length} deployment(s), nothing to prune`);
                      continue;
                    }

                    core.info(
                      `[${env}] ${deps.length} total, keeping ${keep}, ${dryRun ? 'would delete' : 'deleting'} ${toDelete.length}`
                    );

                    for (const d of toDelete) {
                      if (dryRun) {
                        core.info(`  candidate id=${d.id} ref=${d.ref} created=${d.created_at}`);
                        deleted++;
                        continue;
                      }
                      try {
                        await github.rest.repos.deleteDeployment({
                          owner,
                          repo,
                          deployment_id: d.id,
                        });
                        deleted++;
                      } catch (err) {
                        failed++;
                        core.warning(
                          `Failed to delete deployment ${d.id} (${env}): ${err.message}`
                        );
                      }
                    }
                  }

                  const verb = dryRun ? 'candidate(s)' : 'deleted';
                  core.info(`[OK] ${deleted} deployment ${verb}, ${failed} failure(s)`);
                  if (failed > 0 && !dryRun) {
                    core.setFailed(`${failed} deployment delete(s) failed`);
                  }
