name: Prune GitHub deployments
description: >-
    Delete stale GitHub deployment records via the Deployments API, keeping the
    newest N per environment (default 3). Deactivates active deployments before delete.

inputs:
    keep_count:
        description: Number of recent deployments to keep per environment
        required: false
        default: '3'
    dry_run:
        description: List prune candidates only (no deletes)
        required: false
        default: 'false'

runs:
    using: composite
    steps:
        - name: Prune stale GitHub deployments
          uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
          with:
              script: |
                  const keep = Math.max(1, parseInt('${{ inputs.keep_count }}' || '3', 10));
                  const dryRun = String('${{ inputs.dry_run }}').toLowerCase() === 'true';
                  const owner = context.repo.owner;
                  const repo = context.repo.repo;
                  const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

                  if (dryRun) {
                    core.notice('dry_run=true — reporting candidates only');
                  }

                  const deployments = await github.paginate(
                    github.rest.repos.listDeployments,
                    { owner, repo, per_page: 100 }
                  );

                  const byEnv = {};
                  for (const d of deployments) {
                    const env = d.environment || 'unknown';
                    if (!byEnv[env]) byEnv[env] = [];
                    byEnv[env].push(d);
                  }

                  async function markInactive(d, env) {
                    await github.rest.repos.createDeploymentStatus({
                      owner,
                      repo,
                      deployment_id: d.id,
                      state: 'inactive',
                      description: 'Pruned by repository cleanup workflow',
                    });
                  }

                  async function deactivateAndDelete(d, env) {
                    try {
                      await markInactive(d, env);
                    } catch (err) {
                      core.warning(`inactive status for ${d.id} (${env}): ${err.message}`);
                    }

                    await sleep(200);

                    try {
                      await github.rest.repos.deleteDeployment({
                        owner,
                        repo,
                        deployment_id: d.id,
                      });
                      return;
                    } catch (err) {
                      if (err.status !== 422) throw err;
                    }

                    // 422: still active — retry deactivate + delete once
                    await markInactive(d, env);
                    await sleep(400);
                    await github.rest.repos.deleteDeployment({
                      owner,
                      repo,
                      deployment_id: d.id,
                    });
                  }

                  let deleted = 0;
                  let failed = 0;
                  let skipped = 0;

                  for (const [env, deps] of Object.entries(byEnv)) {
                    deps.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                    const toDelete = deps.slice(keep);

                    if (toDelete.length === 0) {
                      core.info(`[${env}] ${deps.length} deployment(s), nothing to prune`);
                      continue;
                    }

                    core.info(
                      `[${env}] ${deps.length} total, keeping ${keep}, ${dryRun ? 'would delete' : 'deleting'} ${toDelete.length}`
                    );

                    const ordered = [...toDelete].sort(
                      (a, b) => new Date(a.created_at) - new Date(b.created_at)
                    );

                    for (const d of ordered) {
                      if (dryRun) {
                        core.info(`  candidate id=${d.id} ref=${d.ref} created=${d.created_at}`);
                        deleted++;
                        continue;
                      }
                      try {
                        await deactivateAndDelete(d, env);
                        deleted++;
                        if (deleted % 25 === 0) {
                          core.info(`[progress] ${deleted} deployment(s) removed so far…`);
                        }
                      } catch (err) {
                        const status = err.status;
                        if (status === 404) {
                          skipped++;
                          continue;
                        }
                        failed++;
                        core.warning(
                          `Failed to delete deployment ${d.id} (${env}): ${err.message}`
                        );
                      }
                    }
                  }

                  const verb = dryRun ? 'candidate(s)' : 'deleted';
                  core.info(
                    `[OK] ${deleted} deployment ${verb}, ${skipped} already gone, ${failed} failure(s)`
                  );

                  if (dryRun) return;

                  if (deleted === 0 && failed > 0) {
                    core.setFailed('No deployments deleted — check deployments:write permission and inactive status support');
                  } else if (failed > 0) {
                    core.warning(
                      `${failed} deployment(s) could not be deleted. Re-run workflow_dispatch to continue pruning.`
                    );
                  }
