name: Setup Node and install deps
description: Standardized Node setup with pnpm and deterministic install
inputs:
    node-version:
        description: Node.js version to install
        required: false
        default: '20'
    install-command:
        description: Install command to run after setup
        required: false
        default: 'pnpm install --frozen-lockfile'
runs:
    using: composite
    steps:
        - name: Enable Corepack
          shell: bash
          run: corepack enable

        - name: Setup Node.js
          uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
          with:
              node-version: ${{ inputs.node-version }}
              cache: pnpm

        - name: Install dependencies
          shell: bash
          run: ${{ inputs.install-command }}
