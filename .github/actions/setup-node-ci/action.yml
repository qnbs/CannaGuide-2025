name: Setup Node and install deps
description: Standardized Node setup with npm cache and deterministic install
inputs:
    node-version:
        description: Node.js version to install
        required: false
        default: '20'
    install-command:
        description: Install command to run after setup
        required: false
        default: 'npm ci --prefer-offline'
runs:
    using: composite
    steps:
        - name: Setup Node.js
          uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
          with:
              node-version: ${{ inputs.node-version }}
              cache: npm

        - name: Install dependencies
          shell: bash
          run: ${{ inputs.install-command }}
