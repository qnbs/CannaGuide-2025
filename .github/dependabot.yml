version: 2
updates:
    - package-ecosystem: npm
      directory: '/'
      schedule:
          interval: weekly
          day: monday
      open-pull-requests-limit: 8
      labels:
          - dependencies
      commit-message:
          prefix: 'chore'
          prefix-development: 'chore'
          include: scope
      groups:
          ai-and-ml:
              patterns:
                  - '@google/genai'
                  - '@mlc-ai/*'
                  - '@xenova/*'
                  - '@tensorflow/*'
                  - 'onnxruntime-web'
          testing:
              patterns:
                  - '@vitest/*'
                  - '@playwright/*'
                  - 'vitest'
                  - '@testing-library/*'
                  - 'fake-indexeddb'
                  - 'msw'
          ui-and-styling:
              patterns:
                  - '@radix-ui/*'
                  - 'tailwind*'
                  - 'class-variance-authority'
                  - 'clsx'
                  - 'recharts'
          security:
              patterns:
                  - 'dompurify'
                  - '@sentry/*'
                  - '@aikidosec/*'
                  - 'snyk'
                  - '@socketsecurity/*'
              update-types:
                  - minor
                  - patch
          build-tools:
              patterns:
                  - 'vite'
                  - 'vite-plugin-*'
                  - '@vitejs/*'
                  - 'turbo'
                  - 'rollup-plugin-*'
                  - 'postcss'
                  - 'autoprefixer'
          linting:
              patterns:
                  - 'eslint'
                  - 'eslint-*'
                  - '@eslint/*'
                  - '@typescript-eslint/*'
                  - 'prettier'
    - package-ecosystem: github-actions
      directory: '/'
      schedule:
          interval: weekly
          day: monday
      open-pull-requests-limit: 5
      labels:
          - dependencies
          - ci
      commit-message:
          prefix: 'chore'
          include: scope
    - package-ecosystem: docker
      directory: '/'
      schedule:
          interval: monthly
      open-pull-requests-limit: 3
      labels:
          - dependencies
          - docker
      commit-message:
          prefix: 'chore'
          include: scope
    - package-ecosystem: docker
      directory: '/docker/esp32-mock'
      schedule:
          interval: monthly
      open-pull-requests-limit: 2
      labels:
          - dependencies
          - docker
    - package-ecosystem: docker
      directory: '/docker/tauri-mock'
      schedule:
          interval: monthly
      open-pull-requests-limit: 2
      labels:
          - dependencies
          - docker
    - package-ecosystem: docker
      directory: '/packages/iot-mocks'
      schedule:
          interval: monthly
      open-pull-requests-limit: 2
      labels:
          - dependencies
          - docker
