version: 2
updates:
    - package-ecosystem: npm
      directory: '/'
      schedule:
          interval: weekly
      open-pull-requests-limit: 10
      groups:
          ai-and-testing:
              patterns:
                  - '@vitest/*'
                  - '@playwright/*'
                  - 'vitest'
                  - 'playwright'
          ui-and-security:
              patterns:
                  - '@radix-ui/*'
                  - 'dompurify'
                  - 'jspdf*'
    - package-ecosystem: github-actions
      directory: '/'
      schedule:
          interval: weekly
