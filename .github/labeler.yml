documentation:
    - changed-files:
          - any-glob-to-any-file:
                - README.md
                - CHANGELOG.md
                - CONTRIBUTING.md
                - CODE_OF_CONDUCT.md
                - SECURITY.md
                - ROADMAP.md
                - docs/**

security:
    - changed-files:
          - any-glob-to-any-file:
                - .github/**
                - package.json
                - package-lock.json
                - .pre-commit-config.yaml
                - .renovaterc.json
                - .gitguardian.yml
                - services/cryptoService.ts
                - securityHeaders.ts

tests:
    - changed-files:
          - any-glob-to-any-file:
                - tests/**
                - '**/*.test.ts'
                - '**/*.test.tsx'
                - vitest.setup.ts
                - playwright.config.ts
                - playwright-ct.config.ts

ai:
    - changed-files:
          - any-glob-to-any-file:
                - services/ai*.ts
                - services/gemini*.ts
                - services/localAi*.ts
                - services/localAI*.ts
                - services/growLogRagService.ts
                - workers/inference.worker.ts
                - packages/ai-core/**

ui:
    - changed-files:
          - any-glob-to-any-file:
                - components/**
                - styles.css
                - tailwind.config.cjs

plants:
    - changed-files:
          - any-glob-to-any-file:
                - stores/slices/plantSlice*
                - components/views/PlantView*
                - data/strains*
                - data/strains/**

i18n:
    - changed-files:
          - any-glob-to-any-file:
                - locales/**
                - i18n.ts

hooks:
    - changed-files:
          - any-glob-to-any-file:
                - hooks/**

services:
    - changed-files:
          - any-glob-to-any-file:
                - services/**

types:
    - changed-files:
          - any-glob-to-any-file:
                - types.ts
                - types/**

workers:
    - changed-files:
          - any-glob-to-any-file:
                - workers/**
                - simulation.worker.ts

docker:
    - changed-files:
          - any-glob-to-any-file:
                - docker/**

iot:
    - changed-files:
          - any-glob-to-any-file:
                - docker/iot-mocks/**
                - services/iotService*
                - hooks/useSensorData.ts

pwa:
    - changed-files:
          - any-glob-to-any-file:
                - public/sw.js
                - public/manifest.json

ci:
    - changed-files:
          - any-glob-to-any-file:
                - .github/workflows/**

config:
    - changed-files:
          - any-glob-to-any-file:
                - vite.config.ts
                - tsconfig.json
                - eslint.config.js
                - postcss.config.cjs
