name: Performance Benchmark

# Advisory only -- runs weekly + on-demand. Does NOT block main pushes.
on:
    workflow_dispatch:
    schedule:
        - cron: '23 3 * * 1'

permissions:
    contents: read

env:
    NODE_VERSION: '24'

jobs:
    benchmark:
        name: Benchmark
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Capture benchmark start
              run: echo "BENCHMARK_START=$(date +%s)" >> "$GITHUB_ENV"

            - name: Enable Corepack
              run: corepack enable

            - name: Setup Node ${{ env.NODE_VERSION }}
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: depcheck
              run: pnpm run depcheck

            - name: Build
              working-directory: apps/web
              run: pnpm run build

            - name: Bundle budget check
              run: node ./scripts/check-bundle-budget.mjs apps/web/dist

            - name: Source map analysis
              working-directory: apps/web
              run: node ../../scripts/explore-bundle.mjs

            - name: Lighthouse CI
              id: lighthouse
              working-directory: apps/web
              run: |
                  pnpm exec lhci autorun \
                    --collect.staticDistDir=./dist \
                    --collect.numberOfRuns=3 \
                    --collect.settings.chromeFlags="--no-sandbox --disable-dev-shm-usage" \
                    2>&1 || {
                    echo "[WARN] Lighthouse CI failed -- metrics will show n/a"
                    echo "lighthouse_failed=true" >> "$GITHUB_ENV"
                  }

            - name: Collect metrics
              working-directory: apps/web
              run: |
                  END_TIME=$(date +%s)
                  export CI_TIME_SECONDS=$((END_TIME - BENCHMARK_START))
                  node ../../scripts/collect-performance-metrics.mjs | tee benchmark-metrics.json
                  node <<'NODE'
                  const fs = require('node:fs')
                  const metrics = JSON.parse(fs.readFileSync('benchmark-metrics.json', 'utf8'))
                  const summary = [
                    '## Performance Benchmark',
                    '',
                    `- Dist size: ${metrics.distSizeKb.toFixed(1)} kB`,
                    `- Main bundle: ${metrics.mainBundleFile ?? 'n/a'} (${metrics.mainBundleKb.toFixed(1)} kB)`,
                    `- Lighthouse performance: ${metrics.lighthousePerformance ?? 'n/a'}/100`,
                    `- Lighthouse accessibility: ${metrics.lighthouseAccessibility ?? 'n/a'}/100`,
                    `- CI time: ${metrics.ciTimeSeconds}s`,
                    '',
                  ].join('\n')
                  fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${summary}\n`)
                  NODE

            - name: Upload benchmark artifacts
              if: always()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: benchmark-artifacts
                  path: |
                      apps/web/dist/source-map-explorer.html
                      apps/web/.lighthouseci/
                      apps/web/benchmark-metrics.json
                  retention-days: 14
                  if-no-files-found: warn
