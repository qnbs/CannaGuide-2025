name: 📱 Capacitor Mobile Builds

# Disabled: native android/ and ios/ directories are not committed yet.
# Re-enable tag trigger once Capacitor platforms are initialized.
on:
    workflow_dispatch:

permissions:
    contents: write

env:
    NODE_VERSION: '20'

jobs:
    build-android:
        name: 🤖 Android Build
        runs-on: ubuntu-latest
        steps:
            - name: 📥 Checkout
              uses: actions/checkout@v4

            - name: ⚙ Setup Node ${{ env.NODE_VERSION }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: ☕ Setup Java 17
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 17

            - name: 📦 Install Node dependencies
              run: npm ci --prefer-offline

            - name: 🏗 Build web assets
              run: npm run build
              env:
                  BUILD_BASE_PATH: /

            - name: 📱 Install Capacitor CLI
              run: npm install -g @capacitor/cli

            - name: 📱 Add Android platform
              run: |
                  npx cap add android || true
                  npx cap sync android

            - name: 🤖 Build Android APK
              working-directory: android
              run: |
                  chmod +x gradlew
                  ./gradlew assembleRelease

            - name: 📤 Upload Android APK
              uses: actions/upload-artifact@v4
              with:
                  name: android-apk
                  path: android/app/build/outputs/apk/release/*.apk
                  retention-days: 30

    build-ios:
        name: 🍎 iOS Build
        runs-on: macos-latest
        steps:
            - name: 📥 Checkout
              uses: actions/checkout@v4

            - name: ⚙ Setup Node ${{ env.NODE_VERSION }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: 📦 Install Node dependencies
              run: npm ci --prefer-offline

            - name: 🏗 Build web assets
              run: npm run build
              env:
                  BUILD_BASE_PATH: /

            - name: 📱 Install Capacitor CLI
              run: npm install -g @capacitor/cli

            - name: 📱 Add iOS platform
              run: |
                  npx cap add ios || true
                  npx cap sync ios

            - name: 🍎 Build iOS (no code signing)
              working-directory: ios/App
              run: |
                  xcodebuild \
                    -workspace App.xcworkspace \
                    -scheme App \
                    -configuration Release \
                    -destination 'generic/platform=iOS Simulator' \
                    -derivedDataPath build \
                    CODE_SIGNING_ALLOWED=NO \
                    build

            - name: 📤 Upload iOS build
              uses: actions/upload-artifact@v4
              with:
                  name: ios-build
                  path: ios/App/build/Build/Products/Release-iphonesimulator/*.app
                  retention-days: 30
