name: ClusterFuzzLite

on:
    # PR trigger removed: ClusterFuzzLite rejects all sanitizer values for
    # JavaScript projects (none=invalid, address/memory=unsupported).
    # PR fuzzing is handled by fuzzing.yml (Jazzer.js, fast-check).
    schedule:
        - cron: '27 4 * * 3' # Weekly Wednesday
    workflow_dispatch:

concurrency:
    group: cflite-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    pr-fuzzing:
        name: PR Fuzzing
        runs-on: ubuntu-latest
        timeout-minutes: 20
        # ClusterFuzzLite has limited JavaScript support -- sanitizers and
        # config_utils may fail. Primary fuzzing via fuzzing.yml (fast-check).
        continue-on-error: true
        permissions:
            contents: read
            security-events: write
        strategy:
            fail-fast: false
            matrix:
                sanitizer: ['none']
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Build Fuzzers (${{ matrix.sanitizer }})
              id: build
              uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
              with:
                  language: javascript
                  sanitizer: ${{ matrix.sanitizer }}

            - name: Run Fuzzers (${{ matrix.sanitizer }})
              id: run
              uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  fuzz-seconds: 300
                  mode: code-change
                  sanitizer: ${{ matrix.sanitizer }}
