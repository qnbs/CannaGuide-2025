name: CI Docs

# Lightweight gates when only markdown/docs change (main ci.yml skips these paths).

on:
    push:
        branches: [main]
        paths:
            - '**/*.md'
            - 'docs/**'
    pull_request:
        branches: [main]
        paths:
            - '**/*.md'
            - 'docs/**'

concurrency:
    group: ci-docs-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    docs-gates:
        name: Docs Quality Gates
        runs-on: ubuntu-latest
        timeout-minutes: 15
        # Advisory — main merge gate is ci.yml (quality + security)
        continue-on-error: true
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: '24'

            - name: MDC validate and context e2e
              run: pnpm run mdc:e2e

            - name: Audit backlog check
              run: node scripts/check-audit-backlog.mjs

            - name: CSP consistency check
              run: node scripts/security/check-csp-consistency.mjs

            - name: Prettier check (changed markdown/MDC only)
              env:
                  LINT_BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'origin/main' }}
              run: |
                  set -euo pipefail
                  BASE="${LINT_BASE_REF}"
                  mapfile -t FILES < <(git diff --name-only "${BASE}"...HEAD -- '*.md' '*.mdc' || true)
                  if [ "${#FILES[@]}" -eq 0 ]; then
                    echo "[OK] No markdown/MDC files changed vs ${BASE}"
                    exit 0
                  fi
                  echo "Prettier check: ${FILES[*]}"
                  npx prettier --check "${FILES[@]}" --ignore-unknown
