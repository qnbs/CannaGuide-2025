name: CI Docs

# Lightweight gates when only markdown/docs change (main ci.yml skips these paths).

on:
    push:
        branches: [main]
        paths:
            - '**/*.md'
            - 'docs/**'
    pull_request:
        branches: [main]
        paths:
            - '**/*.md'
            - 'docs/**'

concurrency:
    group: ci-docs-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    docs-gates:
        name: Docs Quality Gates
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: '24'

            - name: MDC validate and context e2e
              run: pnpm run mdc:e2e

            - name: Audit backlog check
              run: node scripts/check-audit-backlog.mjs

            - name: CSP consistency check
              run: node scripts/security/check-csp-consistency.mjs

            - name: Prettier check (markdown)
              run: pnpm run security:prettier
