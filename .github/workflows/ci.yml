name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read

env:
    NODE_VERSION: '20'

jobs:
    quality:
        name: 🔍 Quality Gates
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node ${{ env.NODE_VERSION }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci --prefer-offline

            - name: Restore Vite cache
              uses: actions/cache@v4
              with:
                  path: node_modules/.vite
                  key: vite-${{ runner.os }}-${{ hashFiles('vite.config.ts', 'tsconfig.json', 'package-lock.json') }}
                  restore-keys: |
                      vite-${{ runner.os }}-

            - name: Restore TypeScript build info
              uses: actions/cache@v4
              with:
                  path: tsconfig.tsbuildinfo
                  key: tsc-${{ runner.os }}-${{ hashFiles('tsconfig.json', 'package-lock.json') }}
                  restore-keys: |
                      tsc-${{ runner.os }}-

            - name: Restore Turbo cache
              uses: actions/cache@v4
              with:
                  path: .turbo
                  key: turbo-${{ runner.os }}-${{ hashFiles('turbo.json', 'package-lock.json') }}
                  restore-keys: |
                      turbo-${{ runner.os }}-

            - name: Security audit (advisory)
              continue-on-error: true
              run: |
                  echo "::warning::Security audit is advisory — check output for HIGH/CRITICAL vulnerabilities"
                  npm audit --audit-level=high --omit=dev

            - name: Security – trojan-source scan
              run: npm run security:trojan-source

            - name: Lint changed files
              env:
                  LINT_BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || '' }}
              run: npm run lint:changed

            - name: Lint strict scopes
              run: npm run lint:scopes

            - name: Type check (all workspaces)
              run: npx turbo run typecheck

            - name: Test + Coverage
              run: npm run test:coverage

            - name: Upload coverage
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-report
                  path: coverage/
                  retention-days: 14

            - name: Build
              run: npm run build
