name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read

env:
    NODE_VERSION: '20'

jobs:
    quality:
        name: 🔍 Quality Gates
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node ${{ env.NODE_VERSION }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Restore Vite cache
              uses: actions/cache@v4
              with:
                  path: node_modules/.vite
                  key: vite-${{ runner.os }}-${{ hashFiles('vite.config.ts', 'tsconfig.json', 'package-lock.json') }}
                  restore-keys: |
                      vite-${{ runner.os }}-

            - name: Security audit
              run: npm audit --audit-level=high --omit=dev

            - name: Lint changed files
              env:
                  LINT_BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || '' }}
              run: npm run lint:changed

            - name: Lint strict scopes
              run: npm run lint:scopes

            - name: Test + Coverage
              run: npm run test:coverage

            - name: Upload coverage
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-report
                  path: coverage/
                  retention-days: 14

            - name: Build
              run: npm run build

            # Lighthouse uses vite preview via startServerCommand (lighthouserc.json)
            # Advisory only – thresholds are tracked, not enforced in CI.
            - name: Lighthouse CI
              continue-on-error: true
              run: npm run lighthouse:ci

            - name: Upload Lighthouse report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: lighthouse-report
                  path: .lighthouseci/
                  retention-days: 14

            - name: Cache Playwright Chromium
              id: playwright-cache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
                  restore-keys: playwright-chromium-${{ runner.os }}-

            - name: Install Playwright browser
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: npm run test:e2e:install:ci

            - name: E2E tests (local)
              continue-on-error: true
              run: npm run test:e2e

            - name: Upload Playwright report
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: test-results/
                  retention-days: 7
