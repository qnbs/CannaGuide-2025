name: CI

# workflow-version: 2026-07-14-parallel (CI Status = build+test+verify+security; E2E advisory)

on:
    push:
        branches: [main, 'cursor/**']
        paths-ignore:
            - '**/*.md'
            - 'docs/**'
            - 'graphify-out/**'
            - '.github/ISSUE_TEMPLATE/**'
            - '.github/pull_request_template.md'
    pull_request:
        branches: [main]
        paths-ignore:
            - '**/*.md'
            - 'docs/**'
            - 'graphify-out/**'
            - '.github/ISSUE_TEMPLATE/**'
            - '.github/pull_request_template.md'
    workflow_dispatch:

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    NODE_VERSION: '24'
    TURBO_TELEMETRY_DISABLED: 1

jobs:
    # ---------------------------------------------------------------------
    # Build -- deliberately the smallest job on the critical path.
    # E2E only needs dist/, so it hangs off THIS job, not off lint and the unit
    # suite. Previously E2E waited on all 21 steps of a single `quality` job
    # (~8.5 min) to obtain an artifact the build produces in ~3.
    # ---------------------------------------------------------------------
    build:
        name: Build
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
              with:
                  egress-policy: audit
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0
            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}
            - name: Restore Turbo cache
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                  path: .turbo
                  key: turbo-${{ runner.os }}-${{ hashFiles('turbo.json', 'pnpm-lock.yaml') }}-${{ github.sha }}
                  restore-keys: |
                      turbo-${{ runner.os }}-${{ hashFiles('turbo.json', 'pnpm-lock.yaml') }}-
                      turbo-${{ runner.os }}-
                  save-always: true
            - name: Build
              run: pnpm run build

            - name: Bundle budget check
              run: node scripts/check-bundle-budget.mjs apps/web/dist/assets

            - name: Upload build artifact
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: dist
                  path: apps/web/dist/
                  retention-days: 1

    # ---------------------------------------------------------------------
    # Unit tests + coverage -- runs in parallel with build and verify
    # ---------------------------------------------------------------------
    test:
        name: Unit Tests + Coverage
        runs-on: ubuntu-latest
        timeout-minutes: 60
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
              with:
                  egress-policy: audit
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0
            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}
            - name: Restore Turbo cache
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                  path: .turbo
                  key: turbo-${{ runner.os }}-${{ hashFiles('turbo.json', 'pnpm-lock.yaml') }}-${{ github.sha }}
                  restore-keys: |
                      turbo-${{ runner.os }}-${{ hashFiles('turbo.json', 'pnpm-lock.yaml') }}-
                      turbo-${{ runner.os }}-
                  save-always: true
            - name: Test + Coverage
              run: pnpm run test:coverage

            - name: Critical path coverage (>=80% lines/functions)
              run: pnpm run check:critical-path-coverage

            - name: Coverage summary (enforced thresholds)
              if: success()
              run: |
                  SUMMARY=apps/web/coverage/coverage-summary.json
                  if [ ! -f "$SUMMARY" ]; then
                    echo "::error::Missing $SUMMARY -- vitest json-summary reporter required"
                    exit 1
                  fi
                  node -e "
                  const fs = require('fs');
                  const s = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')).total;
                  const pct = (k) => (s[k]?.pct ?? 0).toFixed(1);
                  console.log('Coverage total -- lines:', pct('lines') + '%, statements:', pct('statements') + '%, functions:', pct('functions') + '%, branches:', pct('branches') + '%');
                  " "$SUMMARY"

            - name: Upload coverage
              if: always()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: coverage-report
                  path: apps/web/coverage/
                  retention-days: 14

    # ---------------------------------------------------------------------
    # Verify -- lint, types and every source-only gate. Fails fast: a type or
    # lint error now surfaces in ~4 min instead of behind the unit suite.
    # ---------------------------------------------------------------------
    verify:
        name: Lint, Types + Gates
        runs-on: ubuntu-latest
        timeout-minutes: 45
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
              with:
                  egress-policy: audit
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0
            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}
            - name: Install pinned uv
              env:
                  UV_VERSION: '0.8.10'
              run: |
                  curl -LsSf "https://github.com/astral-sh/uv/releases/download/${UV_VERSION}/uv-x86_64-unknown-linux-gnu.tar.gz" \
                    -o /tmp/uv.tar.gz
                  tar -xzf /tmp/uv.tar.gz -C /tmp
                  sudo install /tmp/uv-x86_64-unknown-linux-gnu/uv /usr/local/bin/uv

            - name: Restore Turbo cache
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                  path: .turbo
                  key: turbo-${{ runner.os }}-${{ hashFiles('turbo.json', 'pnpm-lock.yaml') }}-${{ github.sha }}
                  restore-keys: |
                      turbo-${{ runner.os }}-${{ hashFiles('turbo.json', 'pnpm-lock.yaml') }}-
                      turbo-${{ runner.os }}-
                  save-always: true
            - name: Lint changed files
              env:
                  LINT_BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || '' }}
              run: pnpm run lint:changed

            - name: Lint strict scopes
              run: pnpm run lint:scopes

            - name: MDC validate and context e2e
              run: pnpm run mdc:e2e

            - name: Graphify MCP doctor
              run: pnpm run graphify:mcp:doctor

            - name: Type check (workspaces)
              run: pnpm exec turbo run typecheck

            - name: Type check (root)
              run: pnpm run typecheck

            - name: Zero-any enforcement
              run: |
                  COUNT=$(grep -rn ": any\b\|as any\b\|<any>" apps/web/services/ apps/web/stores/ apps/web/components/ apps/web/hooks/ apps/web/utils/ apps/web/workers/ --include="*.ts" --include="*.tsx" | grep -v "\.d\.ts:" | grep -v "\.test\." | grep -v "^\s*//" | grep -v "// .*any" | wc -l)
                  echo "Found ${COUNT} any-usage(s) in app source"
                  if [ "$COUNT" -gt 0 ]; then
                    grep -rn ": any\b\|as any\b\|<any>" apps/web/services/ apps/web/stores/ apps/web/components/ apps/web/hooks/ apps/web/utils/ apps/web/workers/ --include="*.ts" --include="*.tsx" | grep -v "\.d\.ts:" | grep -v "\.test\." | grep -v "^\s*//" | grep -v "// .*any"
                    echo "[FAIL] any usage detected in app source -- strict mode requires zero any"
                    exit 1
                  fi
                  echo "[OK] Zero any in app source"

            - name: File budget (changed files)
              run: pnpm run check:file-budget

            - name: Service dependency acyclic check
              run: node scripts/generate-service-map.mjs

            - name: Check i18n completeness
              run: pnpm run check:i18n

            - name: Strain catalog integrity
              run: pnpm run strains:check-integrity

            - name: Audit backlog check (blocks on open HIGH items)
              run: node scripts/check-audit-backlog.mjs
              continue-on-error: false

            - name: E2E selector stability guard
              run: node scripts/check-e2e-selectors.mjs
              continue-on-error: false

            - name: CSP consistency check
              run: node scripts/security/check-csp-consistency.mjs

    # ---------------------------------------------------------------------
    # Security -- hard-fail, no continue-on-error
    # ---------------------------------------------------------------------
    security:
        name: Security
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Security audit (critical, production)
              run: pnpm audit --audit-level=critical --prod

            - name: Security audit (high, all deps)
              run: pnpm audit --audit-level=high

            - name: Trojan-source scan
              run: pnpm run security:trojan-source

            # Trivy removed 2026-03-24: supply-chain attack (GHSA-69fq-xp46-6x23).
            # Replaced by Grype in security-full.yml (filesystem).
            # CI filesystem scanning covered by pnpm audit + Snyk + CodeQL.
            - name: Gitleaks secret scan
              run: |
                  GITLEAKS_VERSION="8.24.3"
                  curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
                    | tar -xz -C /usr/local/bin gitleaks
                  gitleaks detect --source . --no-banner --redact --config .gitleaks.toml -v

    # ---------------------------------------------------------------------
    # E2E -- Playwright with sharding (reuses dist from the build job)
    # ---------------------------------------------------------------------
    e2e:
        name: E2E Tests (${{ matrix.shard }})
        needs: build
        runs-on: ubuntu-latest
        timeout-minutes: 50
        strategy:
            fail-fast: false
            matrix:
                shard: ['1/2', '2/2']
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Cache Playwright browsers
              id: playwright-cache
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-browsers-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
                  restore-keys: |
                      playwright-browsers-${{ runner.os }}-

            - name: Install Playwright OS dependencies
              run: pnpm run test:e2e:deps:ci

            - name: Install Playwright browsers
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: pnpm run test:e2e:install:ci

            - name: Download build artifact
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: dist
                  path: apps/web/dist/

            - name: Run E2E tests (Chromium)
              working-directory: apps/web
              run: |
                  START_TIME=$SECONDS
                  pnpm exec playwright test -c playwright.config.ts --project=chromium --project=mobile-chrome --grep-invert "Visual Regression|App Screenshots" --shard=${{ matrix.shard }} --retries=2
                  echo "E2E Chromium shard ${{ matrix.shard }} duration: $(( SECONDS - START_TIME ))s"
              timeout-minutes: 30

            - name: Upload Playwright traces on failure
              if: failure()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: e2e-traces-shard${{ strategy.job-index }}-${{ github.run_id }}
                  path: apps/web/test-results/
                  retention-days: 7

    e2e-cross-browser:
        name: E2E Cross-Browser (${{ matrix.shard }})
        needs: build
        if: always() && needs.build.result == 'success'
        continue-on-error: true
        runs-on: ubuntu-latest
        timeout-minutes: 90
        strategy:
            fail-fast: false
            matrix:
                shard: ['1/2', '2/2']
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Cache Playwright browsers
              id: playwright-cache
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-browsers-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
                  restore-keys: |
                      playwright-browsers-${{ runner.os }}-

            - name: Install Playwright OS dependencies
              run: pnpm run test:e2e:deps:ci

            - name: Install Playwright browsers
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: pnpm run test:e2e:install:ci

            - name: Download build artifact
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: dist
                  path: apps/web/dist/

            - name: Run E2E tests (Firefox)
              if: steps.playwright-cache.outcome != 'failure'
              working-directory: apps/web
              run: |
                  START_TIME=$SECONDS
                  pnpm exec playwright test -c playwright.config.ts --project=firefox --grep-invert "Visual Regression|App Screenshots|WebGPU|Bluetooth|mobile-no-overflow" --shard=${{ matrix.shard }}
                  echo "E2E Firefox shard ${{ matrix.shard }} duration: $(( SECONDS - START_TIME ))s"
              timeout-minutes: 40

            # WebKit/Safari: excluded from CI — post-hydration service init is too slow/flaky
            # on GitHub runners; Chromium shard + local `playwright test --project=webkit` cover it.

            - name: Upload Playwright traces on failure
              if: failure()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: e2e-cross-browser-traces-shard${{ strategy.job-index }}-${{ github.run_id }}
                  path: apps/web/test-results/
                  retention-days: 7

    # IoT integration: covered by e2e-integration.yml

    # ---------------------------------------------------------------------
    # Advisory -- metrics & hygiene; never blocks merge (continue-on-error)
    # ---------------------------------------------------------------------
    advisory:
        name: Advisory Metrics
        needs: build
        if: always() && needs.build.result == 'success'
        runs-on: ubuntu-latest
        timeout-minutes: 10
        continue-on-error: true
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Download build artifact
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: dist
                  path: apps/web/dist/

            - name: Critical path metrics
              continue-on-error: true
              run: node scripts/measure-critical-path.mjs apps/web/dist/assets

            - name: File budget (grandfathered god-files)
              continue-on-error: true
              env:
                  FILE_BUDGET_ADVISORY: '1'
              run: node scripts/check-file-budget.mjs

            - name: LocalStorage allowlist
              continue-on-error: true
              run: node scripts/security/check-localstorage-usage.mjs

            - name: Advisory summary
              if: always()
              run: echo "::notice::Advisory job finished — failures here do not block merge."

    # ---------------------------------------------------------------------
    # CI Gate -- build + test + verify + security required; E2E advisory
    # ---------------------------------------------------------------------
    ci-status:
        name: "\u2705 CI Status"
        if: always()
        # build + test + verify together are exactly what the old `quality` job
        # covered \u2014 splitting it must not narrow the merge gate.
        needs: [build, test, verify, security]
        runs-on: ubuntu-latest
        steps:
            - name: Check all jobs passed
              run: |
                  echo "Build:    ${{ needs.build.result }}"
                  echo "Test:     ${{ needs.test.result }}"
                  echo "Verify:   ${{ needs.verify.result }}"
                  echo "Security: ${{ needs.security.result }}"
                  echo "---"
                  FAILED=0
                  if [[ "${{ needs.build.result }}" != "success" ]]; then
                    echo "[FAIL] Build / bundle budget failed"; FAILED=1
                  fi
                  if [[ "${{ needs.test.result }}" != "success" ]]; then
                    echo "[FAIL] Unit tests / coverage gates failed"; FAILED=1
                  fi
                  if [[ "${{ needs.verify.result }}" != "success" ]]; then
                    echo "[FAIL] Lint / types / source gates failed"; FAILED=1
                  fi
                  if [[ "${{ needs.security.result }}" != "success" ]]; then
                    echo "[FAIL] Security checks failed"; FAILED=1
                  fi
                  if [[ "$FAILED" -ne 0 ]]; then exit 1; fi
                  echo "[PASS] CI merge gate passed (build + test + verify + security; E2E advisory)"
