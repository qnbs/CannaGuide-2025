name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=moderate

      - name: Lint changed files
        env:
          LINT_BASE_REF: origin/${{ github.base_ref }}
        run: npm run lint:changed

      - name: Lint strict scopes
        run: npm run lint:scopes

      - name: Test
        run: npm run test -- --run

      - name: Coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Lighthouse CI
        run: npm run lighthouse:ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Deploy smoke (Playwright)
        env:
          DEPLOY_BASE_URL: https://qnbs.github.io/CannaGuide-2025/
        run: npm run test:e2e:deploy
