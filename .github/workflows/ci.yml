name: CI

on:
    push:
        branches: [main]
        paths-ignore:
            - '**/*.md'
            - 'docs/**'
            - '.github/ISSUE_TEMPLATE/**'
            - '.github/pull_request_template.md'
    pull_request:
        branches: [main]
        paths-ignore:
            - '**/*.md'
            - 'docs/**'
            - '.github/ISSUE_TEMPLATE/**'
            - '.github/pull_request_template.md'
    workflow_dispatch:

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    NODE_VERSION: '20'
    TURBO_TELEMETRY_DISABLED: 1

jobs:
    # ---------------------------------------------------------------------
    # Quality Gates -- npm run for root tasks, turbo for workspace packages
    # ---------------------------------------------------------------------
    quality:
        name: Quality Gates
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  fetch-depth: 0

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Restore Turbo cache
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
              with:
                  path: .turbo
                  key: turbo-${{ runner.os }}-${{ hashFiles('turbo.json', 'package-lock.json') }}
                  restore-keys: |
                      turbo-${{ runner.os }}-

            - name: Lint changed files
              env:
                  LINT_BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || '' }}
              run: npm run lint:changed

            - name: Lint strict scopes
              run: npm run lint:scopes

            - name: Type check (workspaces)
              run: npx turbo run typecheck

            - name: Type check (root)
              run: npm run typecheck

            - name: Test + Coverage
              run: npm run test:coverage

            - name: Upload coverage
              if: always()
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
              with:
                  name: coverage-report
                  path: coverage/
                  retention-days: 14

            - name: Build
              run: npm run build

            - name: Upload build artifact
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
              with:
                  name: dist
                  path: dist/
                  retention-days: 1

    # ---------------------------------------------------------------------
    # Security -- hard-fail, no continue-on-error
    # ---------------------------------------------------------------------
    security:
        name: Security
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  fetch-depth: 0

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Security audit (critical)
              run: npm audit --audit-level=critical --omit=dev

            - name: Trojan-source scan
              run: npm run security:trojan-source

            # Trivy removed 2026-03-24: supply-chain attack (GHSA-69fq-xp46-6x23).
            # Replaced by Grype in docker.yml (image) + security-full.yml (filesystem).
            # CI filesystem scanning covered by npm audit + Snyk + CodeQL.
            - name: Gitleaks secret scan
              run: |
                  GITLEAKS_VERSION="8.24.3"
                  curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
                    | tar -xz -C /usr/local/bin gitleaks
                  gitleaks detect --source . --no-banner --redact --config .gitleaks.toml -v

    # ---------------------------------------------------------------------
    # E2E -- Playwright (reuses build artifact from quality)
    # ---------------------------------------------------------------------
    e2e:
        name: E2E Tests
        needs: quality
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Cache Playwright Chromium
              id: playwright-cache
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      playwright-chromium-${{ runner.os }}-

            - name: Install Playwright browser
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: npm run test:e2e:install:ci

            - name: Download build artifact
              uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
              with:
                  name: dist
                  path: dist/

            - name: Run E2E tests
              run: npm run test:e2e

            - name: Upload Playwright traces on failure
              if: failure()
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
              with:
                  name: e2e-traces-${{ github.run_id }}
                  path: test-results/
                  retention-days: 7

    # Docker integration: covered by docker.yml (release) + e2e-integration.yml
    # Tauri build check: covered by tauri-build.yml (release)

    # ---------------------------------------------------------------------
    # CI Gate -- all jobs must pass
    # ---------------------------------------------------------------------
    ci-status:
        name: "\u2705 CI Status"
        if: always()
        needs: [quality, security, e2e]
        runs-on: ubuntu-latest
        steps:
            - name: Check all jobs passed
              run: |
                  echo "Quality:  ${{ needs.quality.result }}"
                  echo "Security: ${{ needs.security.result }}"
                  echo "E2E:      ${{ needs.e2e.result }}"
                  echo "---"
                  if [[ "${{ needs.quality.result }}" != "success" ]]; then
                    echo "[FAIL] Quality gates failed"; exit 1
                  fi
                  if [[ "${{ needs.security.result }}" != "success" ]]; then
                    echo "[FAIL] Security checks failed"; exit 1
                  fi
                  if [[ "${{ needs.e2e.result }}" != "success" ]]; then
                    echo "[WARN] E2E tests failed (non-blocking -- flaky infra tests)"
                  fi
                  echo "[PASS] All CI checks passed"
