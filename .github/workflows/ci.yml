name: CI

# workflow-version: 2026-05-30-audit (bump to re-run quality gates after deploy housekeeping)

on:
    push:
        branches: [main, 'cursor/**']
        paths-ignore:
            - '**/*.md'
            - 'docs/**'
            - 'graphify-out/**'
            - '.github/ISSUE_TEMPLATE/**'
            - '.github/pull_request_template.md'
    pull_request:
        branches: [main]
        paths-ignore:
            - '**/*.md'
            - 'docs/**'
            - 'graphify-out/**'
            - '.github/ISSUE_TEMPLATE/**'
            - '.github/pull_request_template.md'
    workflow_dispatch:

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    NODE_VERSION: '24'
    TURBO_TELEMETRY_DISABLED: 1

jobs:
    # ---------------------------------------------------------------------
    # Quality Gates -- pnpm run for root tasks, turbo for workspace packages
    # ---------------------------------------------------------------------
    quality:
        name: Quality Gates
        runs-on: ubuntu-latest
        timeout-minutes: 90
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Install pinned uv
              env:
                  UV_VERSION: '0.8.10'
              run: |
                  curl -LsSf "https://github.com/astral-sh/uv/releases/download/${UV_VERSION}/uv-x86_64-unknown-linux-gnu.tar.gz" \
                    -o /tmp/uv.tar.gz
                  tar -xzf /tmp/uv.tar.gz -C /tmp
                  sudo install /tmp/uv-x86_64-unknown-linux-gnu/uv /usr/local/bin/uv

            - name: Restore Turbo cache
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                  path: .turbo
                  key: turbo-${{ runner.os }}-${{ hashFiles('turbo.json', 'pnpm-lock.yaml') }}-${{ github.sha }}
                  restore-keys: |
                      turbo-${{ runner.os }}-${{ hashFiles('turbo.json', 'pnpm-lock.yaml') }}-
                      turbo-${{ runner.os }}-
                  save-always: true

            - name: Lint changed files
              env:
                  LINT_BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || '' }}
              run: pnpm run lint:changed

            - name: Lint strict scopes
              run: pnpm run lint:scopes

            - name: MDC validate and context e2e
              run: pnpm run mdc:e2e

            - name: Graphify MCP doctor
              run: pnpm run graphify:mcp:doctor

            - name: Type check (workspaces)
              run: pnpm exec turbo run typecheck

            - name: Type check (root)
              run: pnpm run typecheck

            - name: Zero-any enforcement
              run: |
                  COUNT=$(grep -rn ": any\b\|as any\b\|<any>" apps/web/services/ apps/web/stores/ apps/web/components/ apps/web/hooks/ apps/web/utils/ apps/web/workers/ --include="*.ts" --include="*.tsx" | grep -v "\.d\.ts:" | grep -v "\.test\." | grep -v "^\s*//" | grep -v "// .*any" | wc -l)
                  echo "Found ${COUNT} any-usage(s) in app source"
                  if [ "$COUNT" -gt 0 ]; then
                    grep -rn ": any\b\|as any\b\|<any>" apps/web/services/ apps/web/stores/ apps/web/components/ apps/web/hooks/ apps/web/utils/ apps/web/workers/ --include="*.ts" --include="*.tsx" | grep -v "\.d\.ts:" | grep -v "\.test\." | grep -v "^\s*//" | grep -v "// .*any"
                    echo "[FAIL] any usage detected in app source -- strict mode requires zero any"
                    exit 1
                  fi
                  echo "[OK] Zero any in app source"

            - name: Test + Coverage
              run: pnpm run test:coverage

            - name: Coverage summary (enforced thresholds)
              if: success()
              run: |
                  SUMMARY=apps/web/coverage/coverage-summary.json
                  if [ ! -f "$SUMMARY" ]; then
                    echo "::error::Missing $SUMMARY — vitest json-summary reporter required"
                    exit 1
                  fi
                  node -e "
                  const fs = require('fs');
                  const s = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')).total;
                  const pct = (k) => (s[k]?.pct ?? 0).toFixed(1);
                  console.log('Coverage total — lines:', pct('lines') + '%, statements:', pct('statements') + '%, functions:', pct('functions') + '%, branches:', pct('branches') + '%');
                  " "$SUMMARY"

            - name: Upload coverage
              if: always()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: coverage-report
                  path: apps/web/coverage/
                  retention-days: 14

            - name: Build
              run: pnpm run build

            - name: Bundle budget check
              run: node scripts/check-bundle-budget.mjs apps/web/dist/assets

            - name: Service dependency acyclic check
              run: node scripts/generate-service-map.mjs

            - name: Check i18n completeness
              run: pnpm run check:i18n

            - name: Audit backlog check (blocks on open HIGH items)
              run: node scripts/check-audit-backlog.mjs
              continue-on-error: false

            - name: E2E selector stability guard
              run: node scripts/check-e2e-selectors.mjs
              continue-on-error: false

            - name: CSP consistency check
              run: node scripts/security/check-csp-consistency.mjs

            - name: Upload build artifact
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: dist
                  path: apps/web/dist/
                  retention-days: 1

    # ---------------------------------------------------------------------
    # Security -- hard-fail, no continue-on-error
    # ---------------------------------------------------------------------
    security:
        name: Security
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Security audit (critical)
              run: pnpm audit --audit-level=critical --prod

            - name: Trojan-source scan
              run: pnpm run security:trojan-source

            # Trivy removed 2026-03-24: supply-chain attack (GHSA-69fq-xp46-6x23).
            # Replaced by Grype in security-full.yml (filesystem).
            # CI filesystem scanning covered by pnpm audit + Snyk + CodeQL.
            - name: Gitleaks secret scan
              run: |
                  GITLEAKS_VERSION="8.24.3"
                  curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
                    | tar -xz -C /usr/local/bin gitleaks
                  gitleaks detect --source . --no-banner --redact --config .gitleaks.toml -v

    # ---------------------------------------------------------------------
    # E2E -- Playwright with sharding (reuses build artifact from quality)
    # ---------------------------------------------------------------------
    e2e:
        name: E2E Tests (${{ matrix.shard }})
        needs: quality
        runs-on: ubuntu-latest
        timeout-minutes: 45
        strategy:
            fail-fast: false
            matrix:
                shard: ['1/2', '2/2']
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Cache Playwright browsers
              id: playwright-cache
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-browsers-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
                  restore-keys: |
                      playwright-browsers-${{ runner.os }}-

            - name: Install Playwright browsers
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: pnpm run test:e2e:install:ci

            - name: Download build artifact
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: dist
                  path: apps/web/dist/

            - name: Run E2E tests (Chromium)
              working-directory: apps/web
              run: |
                  START_TIME=$SECONDS
                  pnpm exec playwright test -c playwright.config.ts --project=chromium --project=mobile-chrome --grep-invert "Visual Regression|App Screenshots" --shard=${{ matrix.shard }} --retries=2
                  echo "E2E Chromium shard ${{ matrix.shard }} duration: $(( SECONDS - START_TIME ))s"
              timeout-minutes: 30

            - name: Run E2E tests (Firefox)
              if: always() && steps.playwright-cache.outcome != 'failure'
              continue-on-error: true
              working-directory: apps/web
              run: |
                  START_TIME=$SECONDS
                  pnpm exec playwright test -c playwright.config.ts --project=firefox --grep-invert "Visual Regression|App Screenshots|WebGPU|Bluetooth" --shard=${{ matrix.shard }}
                  echo "E2E Firefox shard ${{ matrix.shard }} duration: $(( SECONDS - START_TIME ))s"
              timeout-minutes: 30

            - name: Run E2E tests (WebKit)
              if: always() && steps.playwright-cache.outcome != 'failure'
              continue-on-error: true
              working-directory: apps/web
              run: |
                  START_TIME=$SECONDS
                  pnpm exec playwright test -c playwright.config.ts --project=webkit --grep-invert "Visual Regression|App Screenshots|WebGPU|Bluetooth" --shard=${{ matrix.shard }} --retries=3
                  echo "E2E WebKit shard ${{ matrix.shard }} duration: $(( SECONDS - START_TIME ))s"
              timeout-minutes: 30

            - name: Run visual regression (snapshot baseline)
              if: always() && matrix.shard == '1/2' && steps.playwright-cache.outcome != 'failure'
              continue-on-error: true
              timeout-minutes: 20
              working-directory: apps/web
              run: pnpm exec playwright test -c playwright.config.ts --grep "Visual Regression" --update-snapshots --workers=1

            - name: Upload visual regression snapshots
              if: always() && matrix.shard == '1/2'
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: e2e-snapshots-${{ github.run_id }}
                  path: apps/web/tests/e2e/__screenshots__/
                  retention-days: 30
                  if-no-files-found: ignore

            - name: Upload Playwright traces on failure
              if: failure()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: e2e-traces-shard${{ strategy.job-index }}-${{ github.run_id }}
                  path: apps/web/test-results/
                  retention-days: 7

    # IoT integration: covered by e2e-integration.yml

    # ---------------------------------------------------------------------
    # Advisory -- metrics & hygiene; never blocks merge (continue-on-error)
    # ---------------------------------------------------------------------
    advisory:
        name: Advisory Metrics
        needs: quality
        if: always() && needs.quality.result == 'success'
        runs-on: ubuntu-latest
        timeout-minutes: 10
        continue-on-error: true
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Download build artifact
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: dist
                  path: apps/web/dist/

            - name: Critical path metrics
              continue-on-error: true
              run: node scripts/measure-critical-path.mjs apps/web/dist/assets

            - name: File budget (grandfathered god-files)
              continue-on-error: true
              env:
                  FILE_BUDGET_ADVISORY: '1'
              run: node scripts/check-file-budget.mjs

            - name: LocalStorage allowlist
              continue-on-error: true
              run: node scripts/security/check-localstorage-usage.mjs

            - name: Advisory summary
              if: always()
              run: echo "::notice::Advisory job finished — failures here do not block merge."

    # ---------------------------------------------------------------------
    # CI Gate -- quality + security required; E2E advisory (stable hardening)
    # ---------------------------------------------------------------------
    ci-status:
        name: "\u2705 CI Status"
        if: always()
        needs: [quality, security, e2e]
        runs-on: ubuntu-latest
        steps:
            - name: Check all jobs passed
              run: |
                  echo "Quality:  ${{ needs.quality.result }}"
                  echo "Security: ${{ needs.security.result }}"
                  echo "E2E:      ${{ needs.e2e.result }}"
                  echo "---"
                  if [[ "${{ needs.quality.result }}" != "success" ]]; then
                    echo "[FAIL] Quality gates failed"; exit 1
                  fi
                  if [[ "${{ needs.security.result }}" != "success" ]]; then
                    echo "[FAIL] Security checks failed"; exit 1
                  fi
                  if [[ "${{ needs.e2e.result }}" != "success" ]]; then
                    echo "::warning::E2E tests failed (advisory — Chromium/mobile-chrome; check traces artifact)"
                    echo "[WARN] E2E non-blocking — quality + security are the merge gate"
                  fi
                  echo "[PASS] CI merge gate passed (quality + security)"
