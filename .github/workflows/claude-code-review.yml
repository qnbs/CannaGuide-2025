name: Claude Code Review

on:
    pull_request:
        types: [opened, synchronize, ready_for_review, reopened]
        # Optional: Only run on specific file changes
        # paths:
        #   - "src/**/*.ts"
        #   - "src/**/*.tsx"
        #   - "src/**/*.js"
        #   - "src/**/*.jsx"

# Least-privilege default token; the job below grants exactly what it needs.
permissions:
    contents: read

jobs:
    claude-review:
        # Skip PRs from forks: fork runs do not receive repo secrets, so the Claude step
        # cannot authenticate -- and we do not want a write token exposed to untrusted code.
        if: github.event.pull_request.head.repo.full_name == github.repository
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
            issues: write
            id-token: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 1
                  persist-credentials: false

            - name: Run Claude Code Review
              id: claude-review
              uses: anthropics/claude-code-action@12531344451323133b0493233c759991ac61da12 # v1
              with:
                  claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
                  plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
                  plugins: 'code-review@claude-code-plugins'
                  # --comment posts findings as inline PR review comments. Without it,
                  # /code-review runs but buffers nothing ("No buffered inline comments")
                  # and its report is hidden from the Action log ("full output hidden for
                  # security") -- so the review is invisible and can't be actioned. With
                  # --comment the findings land as review threads, addressed in the same
                  # correction loop as CodeRabbit.
                  prompt: '/code-review:code-review --comment ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
                  # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
                  # or https://code.claude.com/docs/en/cli-reference for available options
