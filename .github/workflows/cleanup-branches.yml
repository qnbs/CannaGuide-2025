name: Cleanup Stale Branches

on:
    schedule:
        # Weekly — Sunday 04:00 UTC (after deployment cleanup at 03:00)
        - cron: '0 4 * * 0'
    workflow_dispatch:
        inputs:
            dry_run:
                description: 'List candidates only (no deletes)'
                required: false
                type: boolean
                default: false
            include_closed_pr_branches:
                description: 'Also delete cursor/* and dependabot/* with closed/merged PRs'
                required: false
                type: boolean
                default: true

permissions: {}

jobs:
    cleanup:
        name: Prune merged and closed PR branches
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: write
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Cleanup stale remote branches
              uses: ./.github/actions/cleanup-branches
              with:
                  dry_run: ${{ inputs.dry_run || 'false' }}
                  include_closed_pr_branches: ${{ inputs.include_closed_pr_branches || 'true' }}
