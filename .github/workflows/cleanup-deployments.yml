name: Cleanup Old Deployments

on:
    schedule:
        # Nightly safety net (post-deploy workflows prune after each deploy)
        - cron: '0 3 * * *'
    workflow_dispatch:
        inputs:
            keep_count:
                description: 'Number of recent deployments to keep per environment'
                required: false
                default: '3'
            dry_run:
                description: 'List candidates only (no deletes)'
                required: false
                type: boolean
                default: false

permissions: {}

jobs:
    cleanup:
        name: Prune old deployments
        runs-on: ubuntu-latest
        timeout-minutes: 45
        continue-on-error: true
        permissions:
            contents: read
            deployments: write
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Prune stale GitHub deployments
              uses: ./.github/actions/prune-deployments
              with:
                  keep_count: ${{ inputs.keep_count || '3' }}
                  dry_run: ${{ inputs.dry_run || 'false' }}
