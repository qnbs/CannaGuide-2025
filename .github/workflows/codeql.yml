name: CodeQL

# Advanced CodeQL scanning. GitHub "Default Setup" is DISABLED (repo Settings ->
# Code security -> CodeQL), so this workflow is the single code-scanning source --
# no dual-source "Code scanning configuration error". It covers the same languages
# Default Setup did (javascript-typescript, actions, python, rust) via build-mode:
# none, and keeps the repo's custom config (paths-ignore + security-and-quality).
# See docs/code-scanning-setup.md

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    schedule:
        - cron: '19 5 * * 1'
    workflow_dispatch:

concurrency:
    group: codeql-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    analyze:
        name: Analyze (${{ matrix.language }})
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
            actions: read
            contents: read
            security-events: write
        strategy:
            fail-fast: false
            matrix:
                language: [javascript-typescript, actions, python, rust]
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Initialize CodeQL
              uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
              with:
                  languages: ${{ matrix.language }}
                  build-mode: none
                  queries: security-and-quality
                  config-file: ./.github/codeql/codeql-config.yml

            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
              with:
                  category: /language:${{ matrix.language }}
