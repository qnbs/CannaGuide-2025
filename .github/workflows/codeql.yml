name: CodeQL

on:
    workflow_dispatch:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    schedule:
        # Weekly Monday 06:00 UTC
        - cron: '0 6 * * 1'

concurrency:
    group: codeql-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    analyze:
        name: CodeQL Analysis
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            actions: read
            contents: read
            security-events: write
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Initialize CodeQL
              uses: github/codeql-action/init@ebcb5b36ded6beda4ceefea6a8bc4cc885255bb3
              with:
                  languages: javascript-typescript
                  queries: security-and-quality
                  config: |
                      paths-ignore:
                          - dist/**
                          - node_modules/**
                          - coverage/**
                          - test-results/**

            - name: Autobuild
              uses: github/codeql-action/autobuild@ebcb5b36ded6beda4ceefea6a8bc4cc885255bb3

            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@ebcb5b36ded6beda4ceefea6a8bc4cc885255bb3
              with:
                  category: '/language:javascript-typescript'
