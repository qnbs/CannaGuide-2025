name: CodeQL

on:
    workflow_dispatch:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    schedule:
        # Weekly Monday 06:00 UTC
        - cron: '0 6 * * 1'

concurrency:
    group: codeql-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    analyze:
        name: CodeQL Analysis
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            actions: read
            contents: read
            security-events: write
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Initialize CodeQL
              uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13
              with:
                  languages: javascript-typescript
                  queries: security-and-quality
                  config: |
                      paths-ignore:
                          - dist/**
                          - node_modules/**
                          - coverage/**
                          - test-results/**

            - name: Autobuild
              uses: github/codeql-action/autobuild@c10b8064de6f491fea524254123dbe5e09572f13

            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13
              with:
                  category: '/language:javascript-typescript'
