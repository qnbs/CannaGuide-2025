name: CodeQL

on:
    workflow_dispatch:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    schedule:
        # Weekly Monday 06:00 UTC
        - cron: '0 6 * * 1'

concurrency:
    group: codeql-${{ github.ref }}
    cancel-in-progress: true

permissions:
    actions: read
    contents: read
    security-events: write

jobs:
    analyze:
        name: 🔬 CodeQL Analysis
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

            - name: Initialize CodeQL
              uses: github/codeql-action/init@256d634097be96e792d6764f9edaefc4320557b1
              with:
                  languages: javascript-typescript
                  queries: security-and-quality
                  config: |
                      paths-ignore:
                          - dist/**
                          - node_modules/**
                          - coverage/**
                          - test-results/**
                          - .stryker-tmp/**

            - name: Autobuild
              uses: github/codeql-action/autobuild@256d634097be96e792d6764f9edaefc4320557b1

            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@256d634097be96e792d6764f9edaefc4320557b1
              with:
                  category: '/language:javascript-typescript'
