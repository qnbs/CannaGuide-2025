name: CodeQL

# Advanced CodeQL setup (canonical). If the Security tab shows
# "Code scanning configuration error", disable CodeQL *default setup* in
# repo Settings → Code security → Code scanning → CodeQL → Switch to advanced.
# See docs/code-scanning-setup.md

on:
    workflow_dispatch:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    schedule:
        - cron: '0 6 * * 1'

concurrency:
    group: codeql-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    analyze:
        name: CodeQL Analysis
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            actions: read
            contents: read
            security-events: write
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Initialize CodeQL
              uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
              with:
                  languages: javascript-typescript
                  queries: security-and-quality
                  config-file: ./.github/codeql/codeql-config.yml

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci

            - name: Build for CodeQL analysis
              run: pnpm run build

            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
              with:
                  category: /language:javascript-typescript
