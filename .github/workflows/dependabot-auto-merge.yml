name: Dependabot Auto-Merge

on:
    pull_request:
        types: [opened, synchronize, reopened]

concurrency:
    group: dependabot-auto-merge-${{ github.event.pull_request.number }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    auto-merge:
        if: github.actor == 'dependabot[bot]'
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
              with:
                  egress-policy: audit

            - name: Fetch Dependabot metadata
              id: metadata
              uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
              with:
                  # alert-lookup defaults to false, and ghsa-id stays empty without it —
                  # the advisory guard below would then wave every non-major PR through.
                  # The default GITHUB_TOKEN has no scope for Dependabot alerts, so this
                  # needs a PAT or App token with "Dependabot alerts: read".
                  alert-lookup: true
                  github-token: ${{ secrets.DEPENDABOT_ALERTS_TOKEN || secrets.GITHUB_TOKEN }}

            # Fail safe: an empty ghsa-id is indistinguishable from a lookup that never
            # ran, so without the token we must not auto-merge anything at all.
            - name: Verify advisory lookup is available
              id: guard
              env:
                  HAS_TOKEN: ${{ secrets.DEPENDABOT_ALERTS_TOKEN != '' }}
              run: |
                  if [ "$HAS_TOKEN" = "true" ]; then
                    echo "lookup=ok" >> "$GITHUB_OUTPUT"
                  else
                    echo "lookup=unavailable" >> "$GITHUB_OUTPUT"
                    echo "::warning::Auto-merge disabled — DEPENDABOT_ALERTS_TOKEN is unset, so advisory PRs cannot be told apart from routine ones. Add a token with 'Dependabot alerts: read'."
                  fi

            # A security PR is one Dependabot raised from a GitHub advisory, which
            # fetch-metadata reports via ghsa-id. Matching on the PR title instead
            # would skip the routine group named "security" while auto-merging real
            # advisory PRs, whose titles never contain the word.
            - name: Announce manual review for advisory PR
              if: steps.metadata.outputs.ghsa-id != ''
              env:
                  GHSA_ID: ${{ steps.metadata.outputs.ghsa-id }}
              run: echo "::notice::Skipping auto-merge — $GHSA_ID advisory requires manual review."

            - name: Auto-merge patch and minor updates
              if: >-
                  steps.guard.outputs.lookup == 'ok' &&
                  steps.metadata.outputs.update-type != 'version-update:semver-major' &&
                  steps.metadata.outputs.ghsa-id == ''
              run: |
                  gh pr review "$PR_URL" --approve
                  gh pr merge "$PR_URL" --auto --squash
              env:
                  PR_URL: ${{ github.event.pull_request.html_url }}
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
