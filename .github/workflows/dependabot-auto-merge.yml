name: Dependabot Auto-Merge

on:
    pull_request:
        types: [opened, synchronize, reopened]

concurrency:
    group: dependabot-auto-merge-${{ github.event.pull_request.number }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    auto-merge:
        if: github.actor == 'dependabot[bot]'
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
              with:
                  egress-policy: audit

            - name: Fetch Dependabot metadata
              id: metadata
              uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Detect security-related Dependabot PR
              id: security
              env:
                  PR_URL: ${{ github.event.pull_request.html_url }}
              run: |
                  labels=$(gh pr view "$PR_URL" --json labels --jq '[.labels[].name] | join(" ")' || true)
                  title='${{ github.event.pull_request.title }}'
                  if echo "$labels $title" | grep -Eiq '(^|[[:space:]])security([[:space:]]|$)|security-updates|dependabot.*security'; then
                    echo "skip=true" >> "$GITHUB_OUTPUT"
                    echo "::notice::Skipping auto-merge — security-related dependency update requires manual review."
                  else
                    echo "skip=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Auto-merge patch and minor updates
              if: >-
                  steps.metadata.outputs.update-type != 'version-update:semver-major' &&
                  steps.security.outputs.skip != 'true'
              run: |
                  gh pr review "$PR_URL" --approve
                  gh pr merge "$PR_URL" --auto --squash
              env:
                  PR_URL: ${{ github.event.pull_request.html_url }}
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
