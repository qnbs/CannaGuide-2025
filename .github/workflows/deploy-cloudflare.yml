name: Deploy to Cloudflare Pages

# Secondary production mirror (root base path). Requires repository secrets:
# CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.
# Primary: GitHub Pages (deploy.yml) + Vercel (vercel.json / dashboard).

on:
    workflow_run:
        workflows: [CI]
        types: [completed]
        branches: [main]
    pull_request:
        branches: [main]
        types: [opened, synchronize, reopened]
    workflow_dispatch:
        inputs:
            deploy_target:
                description: 'production (main) or preview (PR branch)'
                required: false
                default: 'auto'
                type: choice
                options:
                    - auto
                    - production
                    - preview

permissions:
    contents: read

concurrency:
    group: cloudflare-pages-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

env:
    NODE_VERSION: '24'
    CF_PROJECT_NAME: cannaguide-2025
    CF_PAGES_URL: https://cannaguide-2025.pages.dev

jobs:
    gate:
        name: Cloudflare secrets gate
        runs-on: ubuntu-latest
        outputs:
            configured: ${{ steps.secrets.outputs.configured }}
        steps:
            - name: Check Cloudflare secrets
              id: secrets
              run: |
                  if [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] && [ -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
                    echo "configured=true" >> "$GITHUB_OUTPUT"
                    echo "::notice::Cloudflare secrets present — deploy jobs may run."
                  else
                    echo "configured=false" >> "$GITHUB_OUTPUT"
                    echo "::notice title=Cloudflare Pages::CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID not set — skipping wrangler deploy."
                  fi

    deploy:
        name: Build & Deploy (Production)
        needs: gate
        # Advisory mirror — GitHub Pages + Vercel are primary; do not block main on CF API quirks.
        continue-on-error: true
        if: >-
            needs.gate.outputs.configured == 'true' &&
            (github.event_name == 'workflow_dispatch' ||
            (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'))
        runs-on: ubuntu-latest
        timeout-minutes: 25
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Restore Turbo cache
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                  path: .turbo
                  key: turbo-cf-${{ runner.os }}-${{ hashFiles('turbo.json', 'pnpm-lock.yaml') }}-${{ github.sha }}
                  restore-keys: |
                      turbo-cf-${{ runner.os }}-${{ hashFiles('turbo.json', 'pnpm-lock.yaml') }}-
                      turbo-${{ runner.os }}-

            - name: Build for Cloudflare Pages
              env:
                  BUILD_BASE_PATH: /
              run: |
                  echo "::group::vite build (BUILD_BASE_PATH=/)"
                  pnpm run build
                  echo "::endgroup::"
                  echo "[OK] Build complete — dist size: $(du -sh apps/web/dist | cut -f1)"

            - name: Verify wrangler CLI
              run: pnpm exec wrangler --version

            - name: Ensure Cloudflare Pages project exists
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
              run: |
                  set +e
                  OUT=$(pnpm exec wrangler pages project create "${{ env.CF_PROJECT_NAME }}" --production-branch=main 2>&1)
                  CODE=$?
                  echo "$OUT"
                  if [ "$CODE" -eq 0 ]; then
                    echo "::notice::Created Pages project ${{ env.CF_PROJECT_NAME }}"
                  elif echo "$OUT" | grep -qiE 'already exists|80000133|8000002'; then
                    echo "::notice::Pages project ${{ env.CF_PROJECT_NAME }} already exists"
                  else
                    echo "::warning::Could not create Pages project (exit ${CODE}). Deploy will retry; create manually in the Cloudflare dashboard if this persists."
                  fi
                  set -e

            - name: Deploy to Cloudflare Pages
              id: deploy
              uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  packageManager: pnpm
                  wranglerVersion: '4.105.0'
                  command: pages deploy apps/web/dist --project-name=${{ env.CF_PROJECT_NAME }} --branch=main

            - name: Post-deploy health check
              if: steps.deploy.outcome == 'success'
              run: |
                  CF_URL="${{ steps.deploy.outputs.deployment-url || env.CF_PAGES_URL }}"
                  echo "Health-checking ${CF_URL} ..."
                  STATUS=$(curl -sSo /dev/null -w '%{http_code}' --max-time 20 "${CF_URL}")
                  if [ "$STATUS" = "200" ]; then
                    echo "[OK] Cloudflare Pages healthy (HTTP ${STATUS})"
                  else
                    echo "::error::Unexpected HTTP ${STATUS} from ${CF_URL}"
                    exit 1
                  fi

    preview:
        name: PR Preview Deploy
        needs: gate
        # Advisory — Vercel is the primary PR preview; CF project may be absent in account.
        continue-on-error: true
        if: >-
            needs.gate.outputs.configured == 'true' &&
            github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
        timeout-minutes: 25
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Checkout PR
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Build for preview
              env:
                  BUILD_BASE_PATH: /
              run: |
                  echo "::group::vite build (preview)"
                  pnpm run build
                  echo "::endgroup::"

            - name: Resolve Cloudflare preview branch name
              id: cf_preview_branch
              env:
                  RAW_HEAD_REF: ${{ github.head_ref }}
              run: |
                  RAW="${RAW_HEAD_REF}"
                  if ! printf '%s' "$RAW" | grep -Eq '^[a-zA-Z0-9._/-]+$'; then
                    RAW=""
                  fi
                  SAFE=$(printf '%s' "$RAW" | sed 's/[^a-zA-Z0-9._-]/-/g' | sed 's/^-*//;s/-*$//' | cut -c1-63)
                  if [ -z "$SAFE" ]; then SAFE="pr-${{ github.event.pull_request.number }}"; fi
                  echo "name=${SAFE}" >> "$GITHUB_OUTPUT"
                  echo "::notice::Cloudflare preview branch: ${SAFE} (from ${RAW})"

            - name: Verify wrangler CLI
              run: pnpm exec wrangler --version

            - name: Ensure Cloudflare Pages project exists
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
              run: |
                  set +e
                  OUT=$(pnpm exec wrangler pages project create "${{ env.CF_PROJECT_NAME }}" --production-branch=main 2>&1)
                  CODE=$?
                  echo "$OUT"
                  if [ "$CODE" -eq 0 ]; then
                    echo "::notice::Created Pages project ${{ env.CF_PROJECT_NAME }}"
                  elif echo "$OUT" | grep -qiE 'already exists|80000133|8000002'; then
                    echo "::notice::Pages project ${{ env.CF_PROJECT_NAME }} already exists"
                  else
                    echo "::warning::Could not ensure Pages project (exit ${CODE})"
                  fi
                  set -e

            - name: Deploy preview to Cloudflare Pages
              id: preview-deploy
              continue-on-error: true
              uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  packageManager: pnpm
                  wranglerVersion: '4.105.0'
                  command: pages deploy apps/web/dist --project-name=${{ env.CF_PROJECT_NAME }} --branch=${{ steps.cf_preview_branch.outputs.name }}

            - name: Comment preview URL on PR
              if: steps.preview-deploy.outcome == 'success'
              uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
              with:
                  script: |
                      const deployUrl = '${{ steps.preview-deploy.outputs.deployment-url }}';
                      const sha = context.sha.substring(0, 7);
                      const marker = '<!-- cf-preview-comment -->';
                      const body = [
                        marker,
                        '### Cloudflare Pages Preview',
                        '',
                        '| | |',
                        '|---|---|',
                        `| **Preview URL** | ${deployUrl} |`,
                        `| **Commit** | \`${sha}\` |`,
                        `| **Branch** | \`${{ github.head_ref }}\` |`,
                        '',
                        `_Deployed by [deploy-cloudflare.yml](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})_`,
                      ].join('\n');

                      const { data: comments } = await github.rest.issues.listComments({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                        per_page: 50,
                      });
                      const existing = comments.find((c) => c.body && c.body.includes(marker));

                      if (existing) {
                        await github.rest.issues.updateComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: existing.id,
                          body,
                        });
                      } else {
                        await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                          body,
                        });
                      }

    # -------------------------------------------------------------------------
    # PRUNE -- GitHub Deployments API (all environments, keep 3 newest each)
    # Runs even when deploy/preview jobs are skipped (no Cloudflare secrets).
    # -------------------------------------------------------------------------
    prune-deployments:
        name: Prune stale GitHub deployments
        needs: [deploy, preview]
        if: always() && !cancelled()
        runs-on: ubuntu-latest
        continue-on-error: true
        permissions:
            contents: write
            deployments: write
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Prune stale GitHub deployments (keep 3 per environment)
              continue-on-error: true
              uses: ./.github/actions/prune-deployments
              with:
                  keep_count: '3'

            - name: Prune merged and closed PR branches
              continue-on-error: true
              uses: ./.github/actions/cleanup-branches
