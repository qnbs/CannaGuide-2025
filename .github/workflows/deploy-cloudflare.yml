name: Deploy to Cloudflare Pages

on:
    workflow_run:
        workflows: [CI]
        types: [completed]
        branches: [main]
    pull_request:
        branches: [main]
        types: [opened, synchronize, reopened]
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: cloudflare-pages-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

env:
    NODE_VERSION: '24'

jobs:
    # -------------------------------------------------------------------------
    # PRODUCTION DEPLOY -- triggered by successful CI on main
    # -------------------------------------------------------------------------
    deploy:
        name: Build & Deploy (Production)
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
        runs-on: ubuntu-latest
        permissions:
            contents: read
            deployments: write
        timeout-minutes: 15
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Build for Cloudflare Pages
              run: |
                  echo "::group::vite build (base=/)"
                  BUILD_BASE_PATH=/ pnpm run build
                  echo "::endgroup::"
                  echo "[OK] Build complete -- dist size: $(du -sh apps/web/dist | cut -f1)"

            - name: Deploy to Cloudflare Pages
              id: deploy
              uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  packageManager: npm
                  command: pages deploy apps/web/dist --project-name=cannaguide-2025 --branch=main

            - name: Post-deploy health check
              run: |
                  CF_URL="${{ steps.deploy.outputs.deployment-url || 'https://cannaguide-2025.pages.dev' }}"
                  echo "Health-checking ${CF_URL} ..."
                  STATUS=$(curl -sSo /dev/null -w '%{http_code}' --max-time 15 "${CF_URL}")
                  if [ "$STATUS" -eq 200 ]; then
                    echo "[OK] Cloudflare Pages healthy (HTTP ${STATUS})"
                  else
                    echo "[FAIL] Unexpected HTTP ${STATUS} from ${CF_URL}"
                    exit 1
                  fi

    # -------------------------------------------------------------------------
    # PR PREVIEW -- deploy each PR to a unique branch URL
    # URL pattern: https://<branch>.cannaguide-2025.pages.dev
    # -------------------------------------------------------------------------
    preview:
        name: PR Preview Deploy
        if: ${{ github.event_name == 'pull_request' }}
        runs-on: ubuntu-latest
        permissions:
            contents: read
            deployments: write
            pull-requests: write
        timeout-minutes: 15
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
              with:
                  egress-policy: audit

            - name: Checkout PR
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Build for preview
              run: |
                  echo "::group::vite build (base=/)"
                  BUILD_BASE_PATH=/ pnpm run build
                  echo "::endgroup::"
                  echo "[OK] Preview build complete -- dist size: $(du -sh apps/web/dist | cut -f1)"

            - name: Deploy preview to Cloudflare Pages
              id: preview-deploy
              uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  packageManager: npm
                  command: pages deploy apps/web/dist --project-name=cannaguide-2025 --branch=${{ github.head_ref }}

            - name: Comment preview URL on PR
              uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
              with:
                  script: |
                      const deployUrl = '${{ steps.preview-deploy.outputs.deployment-url }}';
                      const sha = context.sha.substring(0, 7);
                      const marker = '<!-- cf-preview-comment -->';
                      const body = [
                        marker,
                        `### Cloudflare Pages Preview`,
                        '',
                        `| | |`,
                        `|---|---|`,
                        `| **Preview URL** | ${deployUrl} |`,
                        `| **Commit** | \`${sha}\` |`,
                        `| **Branch** | \`${{ github.head_ref }}\` |`,
                        '',
                        '_Deployed automatically by [deploy-cloudflare.yml](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})_',
                      ].join('\n');

                      // Find existing preview comment to update (avoid spam)
                      const { data: comments } = await github.rest.issues.listComments({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                        per_page: 50,
                      });
                      const existing = comments.find(c => c.body && c.body.includes(marker));

                      if (existing) {
                        await github.rest.issues.updateComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: existing.id,
                          body,
                        });
                      } else {
                        await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                          body,
                        });
                      }
