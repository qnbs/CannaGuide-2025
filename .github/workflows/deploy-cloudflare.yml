name: Deploy to Cloudflare Pages

# ---------------------------------------------------------------------------
# DISABLED — Automated Cloudflare Pages deploy from GitHub Actions is paused.
# Canonical targets: GitHub Pages (.github/workflows/deploy.yml) + Vercel
# (dashboard). Netlify is also paused (see preview-validation.yml, netlify.toml).
#
# Re-enable: restore `on` triggers from git history — `workflow_run` after CI
# on main, `pull_request`, and optional `workflow_dispatch` — plus deploy jobs.
# ---------------------------------------------------------------------------

on:
    workflow_dispatch:
        inputs:
            note:
                description: 'Automated Cloudflare deploy is off; this run only confirms the workflow placeholder.'
                required: false
                type: string

permissions:
    contents: read

concurrency:
    group: cloudflare-pages-${{ github.run_id }}
    cancel-in-progress: false

jobs:
    deploy:
        name: Build & Deploy (Production)
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - name: Cloudflare Pages deploy paused
              run: |
                  echo "::notice title=Cloudflare Pages::Automated Cloudflare Pages deployment from Actions is paused."
                  echo "Active: GitHub Pages (deploy.yml), Vercel (project settings)."
                  echo "Cloudflare dashboard Git integration may still build; this workflow does not push via wrangler."
