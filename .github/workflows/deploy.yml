name: Deploy to GitHub Pages

on:
    workflow_run:
        workflows: [CI]
        types: [completed]
        branches: [main]
    workflow_dispatch:

# ---------------------------------------------------------------------------
# Permissions -- minimal surface, exactly what each job needs
# ---------------------------------------------------------------------------
permissions:
    contents: read

# ---------------------------------------------------------------------------
# Concurrency -- at most one build+deploy pipeline runs at a time.
# A new push cancels the in-flight build, but NEVER cancels an active deploy
# (deploy job has its own group without cancel-in-progress so Pages stays stable).
# ---------------------------------------------------------------------------
concurrency:
    group: pages-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref }}
    cancel-in-progress: true

# ---------------------------------------------------------------------------
# Shared env
# ---------------------------------------------------------------------------
env:
    NODE_VERSION: '20'
    PAGES_URL: https://qnbs.github.io/CannaGuide-2025/

jobs:
    # -------------------------------------------------------------------------
    # BUILD -- lint, test, bundle
    # -------------------------------------------------------------------------
    build:
        name: Build
        if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pages: write
            id-token: write
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  fetch-depth: 2 # needed for lint:changed (HEAD~1 diff)

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}

            # -- Quality gates ---------------------------------------------------
            - name: Security audit
              run: npm audit --audit-level=critical --omit=dev

            - name: Lint changed files
              env:
                  LINT_BASE_REF: ${{ github.event_name == 'workflow_dispatch' && format('origin/{0}~1', github.ref_name) || '' }}
              run: |
                  echo "::group::lint:changed"
                  npm run lint:changed
                  echo "::endgroup::"

            - name: Lint strict scopes
              run: |
                  echo "::group::lint:scopes"
                  npm run lint:scopes
                  echo "::endgroup::"

            - name: Type check
              run: npx turbo run typecheck

            - name: Unit tests
              run: |
                  echo "::group::vitest"
                  npm run -w @cannaguide/web test -- --run --reporter=verbose
                  echo "::endgroup::"

            # -- Build -----------------------------------------------------------
            - name: Build for GitHub Pages
              run: |
                  echo "::group::vite build"
                  npm run build:gh
                  echo "::endgroup::"
                  echo "[OK] Build complete -- dist size: $(du -sh apps/web/dist | cut -f1)"

            # -- Pages setup + upload --------------------------------------------
            - name: Configure Pages
              uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b
              with:
                  path: ./apps/web/dist

    # -------------------------------------------------------------------------
    # DEPLOY -- publish to GitHub Pages
    # Own concurrency group so a parallel build cancellation never kills a
    # running deploy (that would leave Pages in an inconsistent state).
    # -------------------------------------------------------------------------
    deploy:
        name: Deploy
        needs: build
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pages: write
            id-token: write
        concurrency:
            group: pages-deploy
            cancel-in-progress: false
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128

            - name: Deployed
              run: echo "[OK] Live at ${{ steps.deployment.outputs.page_url }}"

    # -------------------------------------------------------------------------
    # E2E -- smoke-test the live Pages deployment
    # -------------------------------------------------------------------------
    e2e-pages:
        name: E2E Smoke Tests
        needs: deploy
        runs-on: ubuntu-latest
        # Post-deploy validation is advisory -- failures should not block the
        # green checkmark on the commit.
        continue-on-error: true
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}

            # Cache Playwright browser binaries (~200 MB) -- key on Playwright version
            - name: Cache Playwright Chromium
              id: playwright-cache
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      playwright-chromium-${{ runner.os }}-

            - name: Install Playwright browser
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: npm run test:e2e:install:ci

            - name: Run E2E tests on deployed URL
              env:
                  DEPLOY_BASE_URL: ${{ env.PAGES_URL }}
              run: |
                  echo "::group::playwright e2e"
                  npm run -w @cannaguide/web test:e2e:deploy
                  echo "::endgroup::"

            - name: Upload Playwright traces on failure
              if: failure()
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
              with:
                  name: playwright-traces-${{ github.run_id }}
                  path: apps/web/test-results/
                  retention-days: 7

    # -------------------------------------------------------------------------
    # LIGHTHOUSE -- audit the live Pages deployment
    # -------------------------------------------------------------------------
    lighthouse:
        name: Lighthouse
        needs: deploy
        runs-on: ubuntu-latest
        continue-on-error: true
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Lighthouse CI (live URL)
              run: |
                  npx @lhci/cli autorun \
                    --collect.url=${{ env.PAGES_URL }} \
                    --collect.numberOfRuns=3 \
                    --upload.target=temporary-public-storage

            - name: Upload Lighthouse report
              if: always()
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
              with:
                  name: lighthouse-report-${{ github.run_id }}
                  path: .lighthouseci/
                  retention-days: 14

    # -------------------------------------------------------------------------
    # CLEANUP -- remove old skipped/failed workflow runs to keep history clean.
    # Only the latest successful deploy matters.
    # -------------------------------------------------------------------------
    cleanup:
        name: Cleanup old runs
        needs: deploy
        runs-on: ubuntu-latest
        if: success()
        continue-on-error: true
        permissions:
            actions: write
            contents: read
        steps:
            - name: Delete old skipped and failed runs
              uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const workflowId = 'deploy.yml';
                      const currentRunId = context.runId;

                      // Fetch recent runs for this workflow
                      const { data: { workflow_runs: runs } } = await github.rest.actions.listWorkflowRuns({
                        owner,
                        repo,
                        workflow_id: workflowId,
                        per_page: 50,
                      });

                      let deleted = 0;
                      for (const run of runs) {
                        // Keep the current run and any in-progress runs
                        if (run.id === currentRunId || run.status !== 'completed') continue;
                        // Delete skipped, failed, and cancelled runs
                        if (['skipped', 'failure', 'cancelled'].includes(run.conclusion)) {
                          try {
                            await github.rest.actions.deleteWorkflowRun({ owner, repo, run_id: run.id });
                            deleted++;
                          } catch (e) {
                            // Ignore errors for individual deletions
                          }
                        }
                      }
                      core.info(`[OK] Deleted ${deleted} old skipped/failed/cancelled runs`);
