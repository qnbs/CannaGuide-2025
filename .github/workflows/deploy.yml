name: Deploy to GitHub Pages

on:
    workflow_run:
        workflows: [CI]
        types: [completed]
        branches: [main]
    workflow_dispatch:

# ---------------------------------------------------------------------------
# Permissions -- minimal surface, exactly what each job needs
# ---------------------------------------------------------------------------
permissions:
    contents: read

# ---------------------------------------------------------------------------
# Concurrency -- at most one build+deploy pipeline runs at a time.
# A new push cancels the in-flight build, but NEVER cancels an active deploy
# (deploy job has its own group without cancel-in-progress so Pages stays stable).
# ---------------------------------------------------------------------------
concurrency:
    group: pages-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref }}
    cancel-in-progress: true

# ---------------------------------------------------------------------------
# Shared env
# ---------------------------------------------------------------------------
env:
    NODE_VERSION: '24'
    PAGES_URL: https://qnbs.github.io/CannaGuide-2025/

jobs:
    # -------------------------------------------------------------------------
    # BUILD -- lint, test, bundle
    # -------------------------------------------------------------------------
    build:
        name: Build
        if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pages: write
            id-token: write
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 2 # needed for lint:changed (HEAD~1 diff)

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}

            # -- Quality gates ---------------------------------------------------
            - name: Security audit
              run: pnpm audit --audit-level=critical --prod

            - name: Lint changed files
              env:
                  LINT_BASE_REF: ${{ github.event_name == 'workflow_dispatch' && format('origin/{0}~1', github.ref_name) || '' }}
              run: |
                  echo "::group::lint:changed"
                  pnpm run lint:changed
                  echo "::endgroup::"

            - name: Lint strict scopes
              run: |
                  echo "::group::lint:scopes"
                  pnpm run lint:scopes
                  echo "::endgroup::"

            - name: Type check
              run: pnpm exec turbo run typecheck

            - name: Unit tests
              run: |
                  echo "::group::vitest"
                  pnpm --filter @cannaguide/web run test:run --reporter=verbose
                  echo "::endgroup::"

            # -- Build -----------------------------------------------------------
            - name: Build for GitHub Pages
              run: |
                  echo "::group::vite build"
                  pnpm run build:gh
                  echo "::endgroup::"
                  echo "[OK] Build complete -- dist size: $(du -sh apps/web/dist | cut -f1)"

            # -- Pages setup + upload --------------------------------------------
            - name: Configure Pages
              uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
              with:
                  path: ./apps/web/dist

    # -------------------------------------------------------------------------
    # DEPLOY -- publish to GitHub Pages
    # Own concurrency group so a parallel build cancellation never kills a
    # running deploy (that would leave Pages in an inconsistent state).
    # -------------------------------------------------------------------------
    deploy:
        name: Deploy
        needs: build
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pages: write
            id-token: write
        concurrency:
            group: pages-deploy
            cancel-in-progress: false
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

            - name: Deployed
              run: echo "[OK] Live at ${{ steps.deployment.outputs.page_url }}"

    # -------------------------------------------------------------------------
    # E2E -- smoke-test the live Pages deployment
    # -------------------------------------------------------------------------
    e2e-pages:
        name: E2E Smoke Tests
        needs: deploy
        runs-on: ubuntu-latest
        continue-on-error: true
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}

            # Cache Playwright browser binaries (~200 MB) -- key on Playwright version
            - name: Cache Playwright Chromium
              id: playwright-cache
              uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-chromium-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
                  restore-keys: |
                      playwright-chromium-${{ runner.os }}-

            - name: Install Playwright browser
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: pnpm run test:e2e:install:ci

            - name: Run E2E tests on deployed URL
              env:
                  DEPLOY_BASE_URL: ${{ env.PAGES_URL }}
              run: |
                  echo "::group::playwright e2e"
                  pnpm --filter @cannaguide/web run test:e2e:deploy
                  echo "::endgroup::"

            - name: Upload Playwright traces on failure
              if: failure()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: playwright-traces-${{ github.run_id }}
                  path: apps/web/test-results/
                  retention-days: 7

    # -------------------------------------------------------------------------
    # LIGHTHOUSE -- audit the live Pages deployment
    # -------------------------------------------------------------------------
    lighthouse:
        name: Lighthouse
        needs: deploy
        runs-on: ubuntu-latest
        continue-on-error: true
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Lighthouse CI (live URL)
              run: |
                  pnpm exec lhci autorun \
                    --collect.url=${{ env.PAGES_URL }} \
                    --collect.numberOfRuns=3 \
                    --upload.target=temporary-public-storage \
                    --assert.assertions.first-contentful-paint="error;maxNumericValue=2000" \
                    --assert.assertions.largest-contentful-paint="error;maxNumericValue=4000" \
                    --assert.assertions.total-blocking-time="error;maxNumericValue=300" \
                    --assert.assertions.cumulative-layout-shift="error;maxNumericValue=0.1" \
                    --assert.assertions.categories:performance="warn;minScore=0.9" \
                    --assert.assertions.categories:accessibility="error;minScore=0.9" \
                    --assert.assertions.categories:best-practices="error;minScore=0.9"

            - name: Upload Lighthouse report
              if: always()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: lighthouse-report-${{ github.run_id }}
                  path: .lighthouseci/
                  retention-days: 14

    # -------------------------------------------------------------------------
    # CLEANUP -- remove old skipped/failed workflow runs and stale deployments
    # to keep history clean. Only the latest successful deploy matters.
    # -------------------------------------------------------------------------
    cleanup:
        name: Cleanup old runs and deployments
        needs: deploy
        runs-on: ubuntu-latest
        if: success()
        continue-on-error: true
        permissions:
            actions: write
            contents: read
            deployments: write
        steps:
            - name: Delete old skipped and failed runs
              uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const workflowId = 'deploy.yml';
                      const currentRunId = context.runId;

                      // Fetch recent runs for this workflow
                      const { data: { workflow_runs: runs } } = await github.rest.actions.listWorkflowRuns({
                        owner,
                        repo,
                        workflow_id: workflowId,
                        per_page: 50,
                      });

                      let deleted = 0;
                      for (const run of runs) {
                        // Keep the current run and any in-progress runs
                        if (run.id === currentRunId || run.status !== 'completed') continue;
                        // Delete skipped, failed, and cancelled runs
                        if (['skipped', 'failure', 'cancelled'].includes(run.conclusion)) {
                          try {
                            await github.rest.actions.deleteWorkflowRun({ owner, repo, run_id: run.id });
                            deleted++;
                          } catch (e) {
                            // Ignore errors for individual deletions
                          }
                        }
                      }
                      core.info(`[OK] Deleted ${deleted} old skipped/failed/cancelled runs`);

            - name: Prune old GitHub Pages deployments
              uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const environment = 'github-pages';
                      const KEEP_COUNT = 3;

                      // Fetch all deployments (newest first by default)
                      const deployments = await github.paginate(
                        github.rest.repos.listDeployments,
                        { owner, repo, environment, per_page: 100 }
                      );

                      if (deployments.length <= KEEP_COUNT) {
                        core.info(`[OK] Only ${deployments.length} deployments -- nothing to prune.`);
                        return;
                      }

                      // Keep the N most recent, delete the rest
                      const toDelete = deployments.slice(KEEP_COUNT);
                      let pruned = 0;

                      for (const dep of toDelete) {
                        try {
                          // Mark as inactive (required before deletion)
                          await github.rest.repos.createDeploymentStatus({
                            owner,
                            repo,
                            deployment_id: dep.id,
                            state: 'inactive',
                          });
                          // Delete the deployment
                          await github.rest.repos.deleteDeployment({
                            owner,
                            repo,
                            deployment_id: dep.id,
                          });
                          pruned++;
                        } catch (e) {
                          // Some deployments cannot be deleted (active); skip them
                          core.debug(`Could not delete deployment ${dep.id}: ${e.message}`);
                        }
                      }
                      core.info(`[OK] Pruned ${pruned} of ${toDelete.length} old deployments (kept ${KEEP_COUNT}).`);
