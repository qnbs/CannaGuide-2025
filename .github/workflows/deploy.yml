name: Deploy to GitHub Pages

on:
    workflow_run:
        workflows: [CI]
        types: [completed]
        branches: [main]
    workflow_dispatch:

# ---------------------------------------------------------------------------
# Permissions -- minimal surface, exactly what each job needs
# ---------------------------------------------------------------------------
permissions:
    contents: read

# ---------------------------------------------------------------------------
# Concurrency -- at most one build+deploy pipeline runs at a time.
# A new push cancels the in-flight build, but NEVER cancels an active deploy
# (deploy job has its own group without cancel-in-progress so Pages stays stable).
# ---------------------------------------------------------------------------
concurrency:
    group: pages-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref }}
    cancel-in-progress: true

# ---------------------------------------------------------------------------
# Shared env
# ---------------------------------------------------------------------------
env:
    NODE_VERSION: '24'
    PAGES_URL: https://qnbs.github.io/CannaGuide-2025/

jobs:
    # -------------------------------------------------------------------------
    # BUILD -- lint, test, bundle
    # -------------------------------------------------------------------------
    build:
        name: Build
        if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pages: write
            id-token: write
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 2 # needed for lint:changed (HEAD~1 diff)

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Resolve deploy mode
              id: deploy_mode
              run: |
                  if [ "${{ github.event_name }}" = "workflow_run" ]; then
                    echo "trust_ci=true" >> "$GITHUB_OUTPUT"
                    echo "::notice::CI already passed on main — skipping duplicate quality gates."
                  else
                    echo "trust_ci=false" >> "$GITHUB_OUTPUT"
                  fi

            # -- Quality gates (manual dispatch only; CI workflow_run is trusted) --
            - name: Security audit
              if: steps.deploy_mode.outputs.trust_ci != 'true'
              run: pnpm audit --audit-level=critical --prod

            - name: Lint changed files
              if: steps.deploy_mode.outputs.trust_ci != 'true'
              env:
                  LINT_BASE_REF: ${{ github.event_name == 'workflow_dispatch' && format('origin/{0}~1', github.ref_name) || '' }}
              run: |
                  echo "::group::lint:changed"
                  pnpm run lint:changed
                  echo "::endgroup::"

            - name: Lint strict scopes
              if: steps.deploy_mode.outputs.trust_ci != 'true'
              run: |
                  echo "::group::lint:scopes"
                  pnpm run lint:scopes
                  echo "::endgroup::"

            - name: Type check
              if: steps.deploy_mode.outputs.trust_ci != 'true'
              run: pnpm exec turbo run typecheck

            - name: Check i18n completeness
              if: steps.deploy_mode.outputs.trust_ci != 'true'
              run: pnpm run check:i18n

            - name: Unit tests
              if: steps.deploy_mode.outputs.trust_ci != 'true'
              run: |
                  echo "::group::vitest"
                  pnpm --filter @cannaguide/web run test:run --reporter=verbose
                  echo "::endgroup::"

            - name: Restore Turbo cache
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                  path: .turbo
                  key: turbo-gh-${{ runner.os }}-${{ hashFiles('turbo.json', 'pnpm-lock.yaml') }}-${{ github.sha }}
                  restore-keys: |
                      turbo-gh-${{ runner.os }}-${{ hashFiles('turbo.json', 'pnpm-lock.yaml') }}-
                      turbo-${{ runner.os }}-

            # -- Build -----------------------------------------------------------
            - name: Build for GitHub Pages
              env:
                  BUILD_BASE_PATH: /CannaGuide-2025/
              run: |
                  echo "::group::vite build (BUILD_BASE_PATH=/CannaGuide-2025/)"
                  pnpm run build:gh
                  echo "::endgroup::"
                  echo "[OK] Build complete — dist size: $(du -sh apps/web/dist | cut -f1)"

            # -- Pages setup + upload --------------------------------------------
            - name: Configure Pages
              uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
              with:
                  path: ./apps/web/dist

    # -------------------------------------------------------------------------
    # DEPLOY -- publish to GitHub Pages
    # Own concurrency group so a parallel build cancellation never kills a
    # running deploy (that would leave Pages in an inconsistent state).
    # -------------------------------------------------------------------------
    deploy:
        name: Deploy
        needs: build
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pages: write
            id-token: write
        concurrency:
            group: pages-deploy
            cancel-in-progress: false
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

            - name: Deployed
              run: echo "[OK] Live at ${{ steps.deployment.outputs.page_url }}"

    # -------------------------------------------------------------------------
    # E2E -- smoke-test the live Pages deployment
    # -------------------------------------------------------------------------
    e2e-pages:
        name: E2E Smoke Tests
        needs: deploy
        runs-on: ubuntu-latest
        continue-on-error: true
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}

            # Cache Playwright browser binaries (~200 MB) -- key on Playwright version
            - name: Cache Playwright Chromium
              id: playwright-cache
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-chromium-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
                  restore-keys: |
                      playwright-chromium-${{ runner.os }}-

            - name: Install Playwright browser
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: pnpm run test:e2e:install:ci

            - name: Wait for GitHub Pages to serve content
              run: |
                  echo "::group::pages readiness"
                  for attempt in $(seq 1 36); do
                    status="$(curl -s -o /dev/null -w '%{http_code}' "${{ env.PAGES_URL }}")"
                    if [ "$status" = "200" ]; then
                      if curl -sf "${{ env.PAGES_URL }}assets/" -o /dev/null 2>/dev/null || \
                         curl -sf "${{ env.PAGES_URL }}" | grep -q 'id="root"'; then
                        echo "[OK] Pages responded with 200 and app shell markers (attempt ${attempt})"
                        exit 0
                      fi
                    fi
                    echo "[INFO] Waiting for Pages propagation (attempt ${attempt}/36, HTTP ${status})"
                    sleep 10
                  done
                  echo "::error::Pages URL did not become ready: ${{ env.PAGES_URL }}"
                  exit 1

            - name: Run E2E tests on deployed URL
              env:
                  DEPLOY_BASE_URL: ${{ env.PAGES_URL }}
              run: |
                  echo "::group::playwright e2e"
                  pnpm --filter @cannaguide/web run test:e2e:deploy
                  echo "::endgroup::"

            - name: Upload Playwright traces on failure
              if: failure()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: playwright-traces-${{ github.run_id }}
                  path: apps/web/test-results/
                  retention-days: 7

    # -------------------------------------------------------------------------
    # LIGHTHOUSE -- audit the live Pages deployment
    # -------------------------------------------------------------------------
    lighthouse:
        name: Lighthouse
        needs: deploy
        runs-on: ubuntu-latest
        continue-on-error: true
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Wait for GitHub Pages before Lighthouse
              run: |
                  for attempt in $(seq 1 24); do
                    if curl -sf "${{ env.PAGES_URL }}" | grep -q 'id="root"'; then
                      echo "[OK] App shell visible for Lighthouse (attempt ${attempt})"
                      exit 0
                    fi
                    echo "[INFO] Lighthouse wait attempt ${attempt}/24"
                    sleep 10
                  done
                  echo "::warning::Pages shell not confirmed before Lighthouse; run may NO_FCP"

            - name: Lighthouse CI (live URL)
              run: |
                  pnpm exec lhci autorun \
                    --collect.url=${{ env.PAGES_URL }} \
                    --collect.numberOfRuns=3 \
                    --collect.settings.chromeFlags="--no-sandbox --disable-dev-shm-usage --disable-gpu --headless=new" \
                    --upload.target=temporary-public-storage \
                    --assert.assertions.first-contentful-paint="error;maxNumericValue=2000" \
                    --assert.assertions.largest-contentful-paint="error;maxNumericValue=4000" \
                    --assert.assertions.total-blocking-time="error;maxNumericValue=300" \
                    --assert.assertions.cumulative-layout-shift="error;maxNumericValue=0.1" \
                    --assert.assertions.categories:performance="warn;minScore=0.9" \
                    --assert.assertions.categories:accessibility="error;minScore=0.9" \
                    --assert.assertions.categories:best-practices="error;minScore=0.9"

            - name: Upload Lighthouse report
              if: always()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: lighthouse-report-${{ github.run_id }}
                  path: .lighthouseci/
                  retention-days: 14

    # -------------------------------------------------------------------------
    # CLEANUP -- remove old skipped/failed workflow runs and stale deployments
    # to keep history clean. Only the latest successful deploy matters.
    # -------------------------------------------------------------------------
    cleanup:
        name: Cleanup old runs and deployments
        needs: deploy
        runs-on: ubuntu-latest
        if: success()
        continue-on-error: true
        permissions:
            actions: write
            contents: write
            deployments: write
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Prune stale GitHub deployments (keep 3 per environment)
              uses: ./.github/actions/prune-deployments
              with:
                  keep_count: '3'

            - name: Prune merged and closed PR branches
              uses: ./.github/actions/cleanup-branches

            - name: Delete old skipped and failed runs
              uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const workflowId = 'deploy.yml';
                      const currentRunId = context.runId;

                      // Fetch recent runs for this workflow
                      const { data: { workflow_runs: runs } } = await github.rest.actions.listWorkflowRuns({
                        owner,
                        repo,
                        workflow_id: workflowId,
                        per_page: 50,
                      });

                      let deleted = 0;
                      for (const run of runs) {
                        // Keep the current run and any in-progress runs
                        if (run.id === currentRunId || run.status !== 'completed') continue;
                        // Delete skipped, failed, and cancelled runs
                        if (['skipped', 'failure', 'cancelled'].includes(run.conclusion)) {
                          try {
                            await github.rest.actions.deleteWorkflowRun({ owner, repo, run_id: run.id });
                            deleted++;
                          } catch (e) {
                            // Ignore errors for individual deletions
                          }
                        }
                      }
                      core.info(`[OK] Deleted ${deleted} old skipped/failed/cancelled runs`);
