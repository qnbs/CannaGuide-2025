name: Desktop Build (Tauri v2)

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:

permissions:
    contents: read

env:
    CARGO_INCREMENTAL: 0
    RUST_BACKTRACE: short

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: ubuntu-22.04
                      target: x86_64-unknown-linux-gnu
                    - platform: macos-latest
                      target: aarch64-apple-darwin
                    - platform: macos-latest
                      target: x86_64-apple-darwin
                    - platform: windows-latest
                      target: x86_64-pc-windows-msvc

        runs-on: ${{ matrix.platform }}
        timeout-minutes: 60
        permissions:
            contents: write

        steps:
            - name: Harden runner
              uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
              with:
                  toolchain: stable
                  targets: ${{ matrix.target }}

            - name: Rust cache
              uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
              with:
                  workspaces: apps/desktop/src-tauri

            - name: Install Linux system deps
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libwebkit2gtk-4.1-dev \
                    libappindicator3-dev \
                    librsvg2-dev \
                    patchelf \
                    libgtk-3-dev \
                    libsoup-3.0-dev \
                    libjavascriptcoregtk-4.1-dev

            - name: Enable Corepack
              shell: bash
              run: corepack enable

            - name: Setup pnpm
              uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build frontend
              run: pnpm --filter @cannaguide/web build

            - name: Build Tauri
              uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  projectPath: apps/desktop
                  tauriScript: pnpm tauri
                  args: --target ${{ matrix.target }}

            - name: Upload artifacts
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: desktop-${{ matrix.target }}
                  path: |
                      apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
                      apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
                      apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
                      apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
                      apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
                      apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
                  retention-days: 14
