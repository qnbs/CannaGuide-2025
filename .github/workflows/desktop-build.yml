name: Desktop Build (Tauri v2)

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:

permissions:
    contents: write

env:
    CARGO_INCREMENTAL: 0
    RUST_BACKTRACE: short

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: ubuntu-22.04
                      target: x86_64-unknown-linux-gnu
                    - platform: macos-latest
                      target: aarch64-apple-darwin
                    - platform: macos-latest
                      target: x86_64-apple-darwin
                    - platform: windows-latest
                      target: x86_64-pc-windows-msvc

        runs-on: ${{ matrix.platform }}
        timeout-minutes: 60

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Rust cache
              uses: swatinem/rust-cache@v2
              with:
                  workspaces: apps/desktop/src-tauri

            - name: Install Linux system deps
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libwebkit2gtk-4.1-dev \
                    libappindicator3-dev \
                    librsvg2-dev \
                    patchelf \
                    libgtk-3-dev \
                    libsoup-3.0-dev \
                    libjavascriptcoregtk-4.1-dev

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build frontend
              run: pnpm --filter @cannaguide/web build

            - name: Build Tauri
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  projectPath: apps/desktop
                  tauriScript: pnpm tauri
                  args: --target ${{ matrix.target }}

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: desktop-${{ matrix.target }}
                  path: |
                      apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
                      apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
                      apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
                      apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
                      apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
                      apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
                  retention-days: 14
