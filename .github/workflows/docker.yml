name: 🐳 Docker

# Build + push on release tags; PR-only path-scoped validation.
on:
    push:
        tags: ['v*']
    pull_request:
        branches: [main]
        paths:
            - 'Dockerfile'
            - 'docker/**'
            - '.dockerignore'
            - '.github/workflows/docker.yml'
    workflow_dispatch:

permissions:
    contents: read

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    docker:
        name: 🐳 Build & Push
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
            contents: read
            packages: write
        environment: ${{ github.event_name != 'pull_request' && 'container-release' || '' }}
        steps:
            - name: 📥 Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: 🔧 Set up Docker Buildx
              uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

            - name: 🔑 Login to GHCR
              if: github.event_name != 'pull_request'
              uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: 🏷 Docker metadata
              id: meta
              uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=sha
                      type=semver,pattern={{version}}
                      type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

            - name: 🔨 Build and push
              uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
              with:
                  context: .
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: 🛡 Grype container image scan
              if: github.event_name != 'pull_request'
              uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
              id: grype
              with:
                  image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
                  fail-build: false
                  severity-cutoff: high
                  output-format: sarif

            - name: 📤 Upload Grype SARIF
              if: github.event_name != 'pull_request' && always() && steps.grype.outputs.sarif != ''
              uses: github/codeql-action/upload-sarif@ebcb5b36ded6beda4ceefea6a8bc4cc885255bb3
              with:
                  sarif_file: ${{ steps.grype.outputs.sarif }}
                  category: grype-container

            - name: 🧪 Test container (PR only)
              if: github.event_name == 'pull_request'
              run: |
                  docker build -t cannaguide-test .
                  docker run -d --name cg-test -p 8080:8080 cannaguide-test
                  sleep 3
                  curl -sS --fail http://localhost:8080/ | grep -q "CannaGuide"
                  docker stop cg-test
                  echo "✅ Container health check passed"
                  echo "✅ Container health check passed"
