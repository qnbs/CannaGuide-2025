name: Docker

# Build + push on release tags; PR-only path-scoped validation.
on:
    push:
        tags: ['v*']
    pull_request:
        branches: [main]
        paths:
            - 'Dockerfile'
            - 'docker/**'
            - '.dockerignore'
            - '.github/workflows/docker.yml'
    workflow_dispatch:

concurrency:
    group: docker-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    docker:
        name: Build & Push
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
            contents: read
            packages: write
        environment: ${{ github.event_name != 'pull_request' && 'container-release' || '' }}
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

            - name: Login to GHCR
              if: github.event_name != 'pull_request'
              uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Docker metadata
              id: meta
              uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=sha
                      type=semver,pattern={{version}}
                      type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

            - name: Build and push
              uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
              with:
                  context: .
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Grype container image scan
              if: github.event_name != 'pull_request'
              uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
              id: grype
              with:
                  image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
                  fail-build: false
                  severity-cutoff: high
                  output-format: sarif

            - name: Upload Grype SARIF
              if: github.event_name != 'pull_request' && always() && steps.grype.outputs.sarif != ''
              uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
              with:
                  sarif_file: ${{ steps.grype.outputs.sarif }}
                  category: grype-container

            - name: Test container (PR only)
              if: github.event_name == 'pull_request'
              run: |
                  docker build -t cannaguide-test .
                  docker run -d --name cg-test -p 8080:8080 cannaguide-test
                  for i in $(seq 1 15); do
                    if curl -sS --fail http://localhost:8080/ | grep -q "CannaGuide"; then
                      echo "[OK] Container health check passed"
                      docker stop cg-test
                      exit 0
                    fi
                    echo "[WAIT] Waiting for container... ($i/15)"
                    sleep 2
                  done
                  echo "[FAIL] Container failed to respond within 30s"
                  docker logs cg-test
                  docker stop cg-test
                  exit 1
                  echo "[OK] Container health check passed"
