name: 🐳 Docker

# Build + push on release tags; PR-only path-scoped validation.
# Removed push-to-main trigger to avoid blocking CI with Trivy exit-code 1.
on:
    push:
        tags: ['v*']
    pull_request:
        branches: [main]
        paths:
            - 'Dockerfile'
            - 'docker/**'
            - '.dockerignore'
            - '.github/workflows/docker.yml'
    workflow_dispatch:

permissions:
    contents: read
    packages: write

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    docker:
        name: 🐳 Build & Push
        runs-on: ubuntu-latest
        steps:
            - name: 📥 Checkout
              uses: actions/checkout@v4

            - name: 🔧 Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: 🔑 Login to GHCR
              if: github.event_name != 'pull_request'
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: 🏷 Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=sha
                      type=semver,pattern={{version}}
                      type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

            - name: 🔨 Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: 🔎 Build local image for Trivy
              run: docker build -t cannaguide-scan .

            - name: 🛡 Trivy image scan
              uses: aquasecurity/trivy-action@0.28.0
              with:
                  image-ref: cannaguide-scan
                  format: table
                  severity: HIGH,CRITICAL
                  exit-code: '1'

            - name: 🧪 Test container (PR only)
              if: github.event_name == 'pull_request'
              run: |
                  docker build -t cannaguide-test .
                  docker run -d --name cg-test -p 8080:8080 cannaguide-test
                  sleep 3
                  curl -sS --fail http://localhost:8080/ | grep -q "CannaGuide"
                  docker stop cg-test
                  echo "✅ Container health check passed"
