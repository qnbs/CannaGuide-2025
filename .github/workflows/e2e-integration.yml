name: 🧪 E2E & Integration Tests

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read

env:
    NODE_VERSION: '20'

jobs:
    # ─────────────────────────────────────────────────────────────────────────
    # E2E — WebGPU mocks, IoT simulation, core user flows
    # ─────────────────────────────────────────────────────────────────────────
    e2e:
        name: 🎭 E2E Tests
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: 📥 Checkout
              uses: actions/checkout@v4

            - name: ⚙ Setup Node ${{ env.NODE_VERSION }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: 📦 Install dependencies
              run: npm ci --prefer-offline

            - name: 💾 Cache Playwright Chromium
              id: playwright-cache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      playwright-chromium-${{ runner.os }}-

            - name: 🎭 Install Playwright browser
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: npm run test:e2e:install:ci

            - name: 🏗 Build for E2E
              run: npm run build

            - name: 🧪 Run E2E tests (core + WebGPU + IoT)
              run: |
                  echo "::group::playwright e2e"
                  npm run test:e2e
                  echo "::endgroup::"

            - name: 📊 Upload Playwright traces on failure
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: e2e-traces-${{ github.run_id }}
                  path: test-results/
                  retention-days: 7

    # ─────────────────────────────────────────────────────────────────────────
    # IOT — ESP32 Mock Docker integration
    # ─────────────────────────────────────────────────────────────────────────
    iot-integration:
        name: 🌡 IoT Sensor Integration
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: 📥 Checkout
              uses: actions/checkout@v4

            - name: ⚙ Setup Node ${{ env.NODE_VERSION }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: 📦 Install dependencies
              run: npm ci --prefer-offline

            - name: 🌡 Start ESP32 Mock
              run: |
                  node packages/iot-mocks/src/server.mjs &
                  ESP32_PID=$!
                  echo "ESP32_MOCK_PID=$ESP32_PID" >> "$GITHUB_ENV"
                  # Wait for health endpoint
                  for i in $(seq 1 15); do
                    if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
                      echo "✅ ESP32 mock healthy"
                      break
                    fi
                    echo "⏳ Waiting for ESP32 mock... ($i/15)"
                    sleep 1
                  done

            - name: 🧪 Verify ESP32 sensor endpoint
              run: |
                  RESPONSE=$(curl -sf http://localhost:3001/sensor)
                  echo "Sensor response: $RESPONSE"
                  echo "$RESPONSE" | node -e "
                    const data = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
                    if (typeof data.temperature !== 'number') process.exit(1);
                    if (typeof data.humidity !== 'number') process.exit(1);
                    if (!data.timestamp) process.exit(1);
                    console.log('✅ Sensor data valid:', data.temperature + '°C', data.humidity + '% RH');
                  "

            - name: 🧪 Test sensor value boundaries
              run: |
                  node -e "
                    async function test() {
                      const readings = [];
                      for (let i = 0; i < 10; i++) {
                        const res = await fetch('http://localhost:3001/sensor');
                        const data = await res.json();
                        readings.push(data);
                        await new Promise(r => setTimeout(r, 500));
                      }
                      let allValid = true;
                      for (const r of readings) {
                        if (r.temperature < 15 || r.temperature > 35) {
                          console.error('❌ Temperature out of range:', r.temperature);
                          allValid = false;
                        }
                        if (r.humidity < 30 || r.humidity > 85) {
                          console.error('❌ Humidity out of range:', r.humidity);
                          allValid = false;
                        }
                      }
                      if (allValid) {
                        console.log('✅ All', readings.length, 'readings within expected bounds');
                      } else {
                        process.exit(1);
                      }
                    }
                    test().catch(e => { console.error(e); process.exit(1); });
                  "

            - name: 🧪 Test health endpoint
              run: |
                  HEALTH=$(curl -sf http://localhost:3001/health)
                  echo "$HEALTH" | node -e "
                    const data = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
                    if (data.status !== 'ok') process.exit(1);
                    if (typeof data.uptime !== 'number') process.exit(1);
                    console.log('✅ Health OK, uptime:', data.uptime.toFixed(1) + 's');
                  "

            - name: 🧹 Cleanup ESP32 Mock
              if: always()
              run: |
                  if [ -n "$ESP32_MOCK_PID" ]; then
                    kill "$ESP32_MOCK_PID" 2>/dev/null || true
                  fi

    # ─────────────────────────────────────────────────────────────────────────
    # VISUAL — Screenshot regression testing
    # ─────────────────────────────────────────────────────────────────────────
    visual-regression:
        name: 📸 Visual Regression
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: 📥 Checkout
              uses: actions/checkout@v4

            - name: ⚙ Setup Node ${{ env.NODE_VERSION }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: 📦 Install dependencies
              run: npm ci --prefer-offline

            - name: 💾 Cache Playwright Chromium
              id: playwright-cache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      playwright-chromium-${{ runner.os }}-

            - name: 🎭 Install Playwright browser
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: npm run test:e2e:install:ci

            - name: 🏗 Build for visual tests
              run: npm run build

            - name: 📸 Run visual regression tests
              run: |
                  echo "::group::visual regression"
                  npm run test:e2e:visual
                  echo "::endgroup::"

            - name: 📊 Upload visual diff artifacts
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: visual-regression-diffs-${{ github.run_id }}
                  path: |
                      test-results/
                      tests/e2e/visual-regression.e2e.ts-snapshots/
                  retention-days: 14
