name: IoT Integration Tests

on:
    push:
        branches: [main]
        paths:
            - 'docker/iot-mocks/**'
            - '.github/workflows/e2e-integration.yml'
    pull_request:
        branches: [main]
        paths:
            - 'docker/iot-mocks/**'
            - '.github/workflows/e2e-integration.yml'
    workflow_dispatch:

concurrency:
    group: e2e-integration-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    NODE_VERSION: '24'

jobs:
    # -------------------------------------------------------------------------
    # NOTE: E2E tests removed -- they run in ci.yml (quality -> e2e job).
    # This workflow focuses on IoT integration and Docker Compose validation.
    # -------------------------------------------------------------------------

    # -------------------------------------------------------------------------
    # IOT -- ESP32 Mock Docker integration
    # -------------------------------------------------------------------------
    iot-integration:
        name: IoT Sensor Integration
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Start ESP32 Mock
              run: |
                  node docker/iot-mocks/src/server.mjs &
                  ESP32_PID=$!
                  echo "ESP32_MOCK_PID=$ESP32_PID" >> "$GITHUB_ENV"
                  # Wait for health endpoint
                  for i in $(seq 1 15); do
                    if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
                      echo "[OK] ESP32 mock healthy"
                      break
                    fi
                    echo "[WAIT] Waiting for ESP32 mock... ($i/15)"
                    sleep 1
                  done
                  if ! curl -sf http://localhost:3001/health > /dev/null 2>&1; then
                    echo "[FAIL] ESP32 mock failed to start after 15s"
                    exit 1
                  fi

            - name: Verify ESP32 sensor endpoint
              run: |
                  RESPONSE=$(curl -sf http://localhost:3001/sensor)
                  echo "Sensor response: $RESPONSE"
                  echo "$RESPONSE" | node -e "
                    const data = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
                    if (typeof data.temperature !== 'number') process.exit(1);
                    if (typeof data.humidity !== 'number') process.exit(1);
                    if (!data.timestamp) process.exit(1);
                    console.log('[OK] Sensor data valid:', data.temperature + 'degC', data.humidity + '% RH');
                  "

            - name: Test sensor value boundaries
              run: |
                  node -e "
                    async function test() {
                      const readings = [];
                      for (let i = 0; i < 10; i++) {
                        const res = await fetch('http://localhost:3001/sensor');
                        const data = await res.json();
                        readings.push(data);
                        await new Promise(r => setTimeout(r, 500));
                      }
                      let allValid = true;
                      for (const r of readings) {
                        if (r.temperature < 15 || r.temperature > 35) {
                          console.error('[FAIL] Temperature out of range:', r.temperature);
                          allValid = false;
                        }
                        if (r.humidity < 30 || r.humidity > 85) {
                          console.error('[FAIL] Humidity out of range:', r.humidity);
                          allValid = false;
                        }
                      }
                      if (allValid) {
                        console.log('[OK] All', readings.length, 'readings within expected bounds');
                      } else {
                        process.exit(1);
                      }
                    }
                    test().catch(e => { console.error(e); process.exit(1); });
                  "

            - name: Test health endpoint
              run: |
                  HEALTH=$(curl -sf http://localhost:3001/health)
                  echo "$HEALTH" | node -e "
                    const data = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
                    if (data.status !== 'ok') process.exit(1);
                    if (typeof data.uptime !== 'number') process.exit(1);
                    console.log('[OK] Health OK, uptime:', data.uptime.toFixed(1) + 's');
                  "

            - name: Cleanup ESP32 Mock
              if: always()
              run: |
                  if [ -n "$ESP32_MOCK_PID" ]; then
                    kill "$ESP32_MOCK_PID" 2>/dev/null || true
                  fi
