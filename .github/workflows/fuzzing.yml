name: Fuzzing

on:
    push:
        branches: [main]
        paths:
            - 'apps/web/services/**'
            - 'apps/web/stores/**'
            - 'apps/web/constants.ts'
            - 'apps/web/types.ts'
            - 'apps/web/vite.config.ts'
            - 'apps/web/package.json'
            - 'package-lock.json'
            - '.github/workflows/fuzzing.yml'
    pull_request:
        branches: [main]
        paths:
            - 'apps/web/services/**'
            - 'apps/web/stores/**'
            - 'apps/web/constants.ts'
            - 'apps/web/types.ts'
            - 'apps/web/vite.config.ts'
            - 'apps/web/package.json'
            - 'package-lock.json'
            - '.github/workflows/fuzzing.yml'
    schedule:
        - cron: '17 4 * * 2'
    workflow_dispatch:

concurrency:
    group: fuzzing-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    NODE_VERSION: '20'

jobs:
    url-service-fuzz:
        name: Property Fuzz Tests
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Run fuzz test suite
              run: npm run -w @cannaguide/web test:fuzz
