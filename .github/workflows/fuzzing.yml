name: Fuzzing

on:
    push:
        branches: [main]
        paths:
            - 'apps/web/services/**'
            - 'apps/web/stores/**'
            - 'apps/web/constants.ts'
            - 'apps/web/types.ts'
            - 'apps/web/vite.config.ts'
            - 'apps/web/package.json'
            - 'pnpm-lock.yaml'
            - '.github/workflows/fuzzing.yml'
    pull_request:
        branches: [main]
        paths:
            - 'apps/web/services/**'
            - 'apps/web/stores/**'
            - 'apps/web/constants.ts'
            - 'apps/web/types.ts'
            - 'apps/web/vite.config.ts'
            - 'apps/web/package.json'
            - 'pnpm-lock.yaml'
            - '.github/workflows/fuzzing.yml'
    schedule:
        - cron: '17 4 * * 2'
    workflow_dispatch:

concurrency:
    group: fuzzing-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    NODE_VERSION: '24'

jobs:
    url-service-fuzz:
        name: Property Fuzz Tests
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Run fuzz test suite
              run: pnpm --filter @cannaguide/web run test:fuzz
