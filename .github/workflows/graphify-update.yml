name: Graphify Update

on:
    push:
        branches: [main]
    schedule:
        - cron: '30 3 * * 1'
    workflow_dispatch:

concurrency:
    group: graphify-update-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    refresh-graph:
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: write
            pull-requests: write
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0

            - name: Install pinned uv
              env:
                  UV_VERSION: '0.8.10'
              run: |
                  curl -LsSf "https://github.com/astral-sh/uv/releases/download/${UV_VERSION}/uv-x86_64-unknown-linux-gnu.tar.gz" \
                    -o /tmp/uv.tar.gz
                  tar -xzf /tmp/uv.tar.gz -C /tmp
                  sudo install /tmp/uv-x86_64-unknown-linux-gnu/uv /usr/local/bin/uv

            - name: Update graph
              run: uv run --with graphifyy python -m graphify update .

            - name: Create PR with updated graph artifacts
              run: |
                  if git diff --quiet -- graphify-out; then
                    echo "[SKIP] No graphify changes"
                    exit 0
                  fi
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  BRANCH="automation/graphify-refresh-${{ github.run_id }}"
                  git checkout -b "$BRANCH"
                  git add graphify-out
                  git commit -m "chore(graphify): refresh graph artifacts"
                  git push --set-upstream origin "$BRANCH"
                  gh pr create \
                    --base main \
                    --head "$BRANCH" \
                    --title "chore(graphify): refresh graph artifacts" \
                    --body "Automated Graphify artifact refresh from workflow run ${{ github.run_id }}."
              env:
                  GH_TOKEN: ${{ github.token }}
