name: Labeler

on:
    pull_request_target:
        types: [opened, synchronize, reopened]

permissions:
    contents: read

jobs:
    label:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read
            pull-requests: write
        steps:
            - name: Apply labels
              uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b
              with:
                  repo-token: ${{ secrets.GITHUB_TOKEN }}
