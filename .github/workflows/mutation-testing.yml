name: Mutation Testing

on:
    schedule:
        # Weekly on Sunday 03:00 UTC
        - cron: '0 3 * * 0'
    workflow_dispatch:

concurrency:
    group: mutation-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    NODE_VERSION: '24'
    TURBO_TELEMETRY_DISABLED: 1

jobs:
    stryker:
        name: Stryker Mutation Testing
        runs-on: ubuntu-latest
        timeout-minutes: 480
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Restore Stryker incremental cache
              uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
              with:
                  path: reports/mutation/.stryker-incremental.json
                  key: stryker-incremental-${{ hashFiles('stryker.conf.json', 'apps/web/stores/slices/**/*.ts', 'apps/web/services/equipmentCalculatorService.ts', 'apps/web/services/knowledgeCalculatorService.ts', 'apps/web/services/knowledgeRagService.ts', 'apps/web/utils/lockFreeRingBuffer.ts', 'apps/web/utils/atomicsChannel.ts', 'apps/web/services/workerPool.ts', 'apps/web/stores/useIotStore.ts') }}
                  restore-keys: |
                      stryker-incremental-

            - name: Run Stryker
              working-directory: apps/web
              run: pnpm exec stryker run ../../stryker.conf.json

            - name: Upload mutation report
              if: always()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: mutation-report-${{ github.run_id }}
                  path: reports/mutation/
                  retention-days: 30
                  if-no-files-found: ignore
