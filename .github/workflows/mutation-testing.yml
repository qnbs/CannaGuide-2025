name: Mutation Testing

on:
    schedule:
        # Weekly on Sunday 03:00 UTC
        - cron: '0 3 * * 0'
    workflow_dispatch:

concurrency:
    group: mutation-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    NODE_VERSION: '24'
    TURBO_TELEMETRY_DISABLED: 1

jobs:
    stryker:
        name: Stryker Mutation Testing
        runs-on: ubuntu-latest
        timeout-minutes: 480
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Restore Stryker incremental cache
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                  path: reports/mutation/.stryker-incremental.json
                  # WS-0/D4: every stryker.conf.json `mutate` target must also appear in this hashFiles list.
                  # Editing the mutate list changes stryker.conf.json (hashed above), which busts the cache; the
                  # real risk is a target omitted here -- its later edits won't change the key, so Stryker reuses
                  # a stale incremental result for that file.
                  key: stryker-incremental-${{ hashFiles('stryker.conf.json', 'apps/web/stores/slices/**/*.ts', 'apps/web/services/equipmentCalculatorService.ts', 'apps/web/services/knowledgeCalculatorService.ts', 'apps/web/services/knowledgeRagService.ts', 'apps/web/utils/lockFreeRingBuffer.ts', 'apps/web/utils/atomicsChannel.ts', 'apps/web/services/workerPool.ts', 'apps/web/stores/useIotStore.ts') }}
                  restore-keys: |
                      stryker-incremental-

            - name: Run Stryker
              working-directory: apps/web
              run: pnpm exec stryker run ../../stryker.conf.json

            - name: Upload mutation report
              if: always()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: mutation-report-${{ github.run_id }}
                  path: reports/mutation/
                  retention-days: 30
                  if-no-files-found: ignore
