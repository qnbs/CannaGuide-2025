name: Release Publish

on:
    push:
        tags: ['v*']
    workflow_dispatch:
        inputs:
            tag:
                description: 'Tag to release (e.g. v1.7.0). Tag must exist or will be created.'
                required: true
                type: string
            dry-run:
                description: 'Dry-run mode (build + verify only, no publish)'
                required: false
                type: boolean
                default: false

concurrency:
    group: release-publish-${{ github.event.inputs.tag || github.ref_name }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    NODE_VERSION: '24'
    TURBO_TELEMETRY_DISABLED: 1

# -----------------------------------------------------------------
# Job 1: Build -- produces tarball + CycloneDX SBOM + hash digest
# -----------------------------------------------------------------
jobs:
    build:
        name: Build + SBOM
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: write
        if: >-
            github.event_name == 'push' ||
            github.event_name == 'workflow_dispatch'
        outputs:
            tag: ${{ steps.tag.outputs.name }}
            tarball-name: ${{ steps.tarball.outputs.name }}
            sha256: ${{ steps.tarball.outputs.sha256 }}
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0
                  # Use RELEASE_PAT if available (bypasses tag rulesets),
                  # otherwise fall back to the default GITHUB_TOKEN.
                  token: ${{ secrets.RELEASE_PAT || github.token }}

            # ── CI Status Guard ──────────────────────────────────────
            # Release Publish runs in parallel with Release Gate.
            # No cross-workflow dependency is possible in GitHub Actions.
            # This guard queries the Checks API to verify the CI status
            # job passed on the tagged commit before proceeding.
            # Skipped for workflow_dispatch (maintainer is in control).
            - name: Verify CI passed on tagged commit
              if: github.event_name == 'push'
              env:
                  GH_TOKEN: ${{ github.token }}
                  REPO: ${{ github.repository }}
                  REF: ${{ github.ref_name }}
              shell: bash
              run: |
                  COMMIT_SHA=$(git rev-list -n 1 "${REF}")
                  echo "[INFO] Checking CI status for ${REF} (${COMMIT_SHA})"

                  CONCLUSION=$(gh api "repos/${REPO}/commits/${COMMIT_SHA}/check-runs" \
                    --jq '[.check_runs[] | select(.name | contains("CI Status"))] | .[0].conclusion // empty')

                  if [ -z "${CONCLUSION}" ]; then
                    echo "[WARN] No CI Status check found for ${COMMIT_SHA}."
                    echo "[WARN] This can happen for docs-only commits (paths-ignore)."
                    echo "[WARN] Proceeding with caution."
                  elif [ "${CONCLUSION}" != "success" ]; then
                    echo "[FAIL] CI Status check is '${CONCLUSION}' -- not success."
                    echo "[FAIL] Aborting release. Push tag only after CI is green."
                    exit 1
                  else
                    echo "[OK] CI Status check passed (${CONCLUSION})."
                  fi

            - name: Resolve tag name
              id: tag
              shell: bash
              env:
                  EVENT_NAME: ${{ github.event_name }}
                  INPUT_TAG: ${{ github.event.inputs.tag }}
                  REF_NAME: ${{ github.ref_name }}
              run: |
                  if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
                    TAG="${INPUT_TAG}"
                  else
                    # push event -- github.ref_name is the tag (e.g. v1.7.0)
                    TAG="${REF_NAME}"
                  fi
                  # Strip refs/tags/ prefix if present
                  TAG="${TAG#refs/tags/}"
                  echo "name=${TAG}" >> "$GITHUB_OUTPUT"
                  echo "[INFO] Resolved tag: ${TAG}"

            # ── Ensure Tag Exists ────────────────────────────────────
            # For workflow_dispatch the tag may not exist yet.
            # Create an annotated tag on HEAD and push it.
            # The checkout token (RELEASE_PAT or GITHUB_TOKEN) is used
            # for git push.  If repository rulesets block tag creation,
            # the step fails with a clear error message.
            - name: Ensure tag exists
              if: github.event_name == 'workflow_dispatch'
              env:
                  TAG: ${{ steps.tag.outputs.name }}
              shell: bash
              run: |
                  if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "refs/tags/${TAG}"; then
                    echo "[OK] Tag ${TAG} already exists on remote"
                    exit 0
                  fi

                  echo "[INFO] Tag ${TAG} does not exist on remote -- creating annotated tag"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git config user.name "github-actions[bot]"
                  git tag -a "${TAG}" -m "Release ${TAG}" HEAD

                  if git push origin "refs/tags/${TAG}"; then
                    echo "[OK] Tag ${TAG} created and pushed"
                  else
                    echo ""
                    echo "[FAIL] Could not push tag ${TAG}."
                    echo "[FAIL] Repository rulesets likely block tag creation by GITHUB_TOKEN."
                    echo ""
                    echo "[FIX] Choose one of the following:"
                    echo "  1. Push the tag manually before triggering this workflow:"
                    echo "     git tag -a ${TAG} -m 'Release ${TAG}' && git push origin ${TAG}"
                    echo "  2. Add a RELEASE_PAT repository secret (classic PAT with repo scope)"
                    echo "     that has permission to bypass tag rulesets."
                    echo "  3. Add 'github-actions[bot]' to the tag ruleset bypass list:"
                    echo "     Settings > Rules > Rulesets > Tags > Bypass list"
                    exit 1
                  fi

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Build
              run: pnpm run build

            - name: Create release tarball
              id: tarball
              shell: bash
              env:
                  RELEASE_TAG: ${{ steps.tag.outputs.name }}
              run: |
                  TARBALL="cannaguide-${RELEASE_TAG}-dist.tar.gz"
                  tar -czf "${TARBALL}" -C apps/web/dist .
                  SHA256=$(sha256sum "${TARBALL}" | cut -d ' ' -f 1)
                  echo "name=${TARBALL}" >> "$GITHUB_OUTPUT"
                  echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
                  echo "[INFO] Tarball: ${TARBALL} (sha256: ${SHA256})"

            - name: Generate CycloneDX SBOM
              uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
              with:
                  path: .
                  format: cyclonedx-json
                  output-file: cannaguide-sbom.cyclonedx.json
                  upload-artifact: false

            - name: Upload tarball artifact
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: release-tarball
                  path: ${{ steps.tarball.outputs.name }}
                  if-no-files-found: error
                  retention-days: 5

            - name: Upload SBOM artifact
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: release-sbom
                  path: cannaguide-sbom.cyclonedx.json
                  if-no-files-found: error
                  retention-days: 5

    # -----------------------------------------------------------------
    # Job 2: Release -- attestations (SBOM + build provenance) + publish
    # NOTE: slsa-framework/slsa-github-generator L3 removed -- its
    #   internal Go build fails on ubuntu-24.04 runners (Apr 2026).
    #   GitHub-native actions/attest-build-provenance provides SLSA
    #   build provenance that is verifiable via `gh attestation verify`.
    # -----------------------------------------------------------------
    release:
        name: Publish Release
        runs-on: ubuntu-latest
        timeout-minutes: 10
        needs: [build]
        if: ${{ !(github.event.inputs.dry-run == 'true') }}
        permissions:
            contents: write
            id-token: write
            attestations: write
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0
                  token: ${{ secrets.RELEASE_PAT || github.token }}

            - name: Verify tag exists on remote
              env:
                  TAG: ${{ needs.build.outputs.tag }}
              shell: bash
              run: |
                  if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "refs/tags/${TAG}"; then
                    echo "[OK] Tag ${TAG} verified on remote"
                  else
                    echo "[FAIL] Tag ${TAG} does not exist on remote."
                    echo "[FAIL] The build job should have created it."
                    echo "[FAIL] Push the tag manually:"
                    echo "  git tag -a ${TAG} -m 'Release ${TAG}' && git push origin ${TAG}"
                    exit 1
                  fi

            - name: Download tarball
              uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
              with:
                  name: release-tarball

            - name: Download SBOM
              uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
              with:
                  name: release-sbom

            - name: Generate SBOM attestation
              uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
              with:
                  subject-path: ${{ needs.build.outputs.tarball-name }}
                  sbom-path: cannaguide-sbom.cyclonedx.json

            - name: Generate build provenance attestation
              uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
              with:
                  subject-path: ${{ needs.build.outputs.tarball-name }}

            - name: Create GitHub Release
              env:
                  GH_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
                  TAG: ${{ needs.build.outputs.tag }}
                  TARBALL: ${{ needs.build.outputs.tarball-name }}
                  SHA256: ${{ needs.build.outputs.sha256 }}
              shell: bash
              run: |
                  SBOM_SHA256=$(sha256sum cannaguide-sbom.cyclonedx.json | cut -d ' ' -f 1)

                  NOTES="## CannaGuide ${TAG}

                  **PWA Distribution** -- Build provenance + CycloneDX SBOM

                  ### Artifact Checksums
                  | File | SHA-256 |
                  |------|---------|
                  | ${TARBALL} | \`${SHA256}\` |
                  | cannaguide-sbom.cyclonedx.json | \`${SBOM_SHA256}\` |

                  ### Supply-Chain Verification

                  **Build Provenance (GitHub Attestation):**
                  \`\`\`bash
                  gh attestation verify ${TARBALL} --repo qnbs/CannaGuide-2025
                  \`\`\`

                  **SBOM:** \`cannaguide-sbom.cyclonedx.json\` (CycloneDX JSON)

                  ### Install
                  This is a Progressive Web App. Visit https://qnbs.github.io/CannaGuide-2025/
                  "

                  # Collect release assets
                  ASSETS=("${TARBALL}" "cannaguide-sbom.cyclonedx.json")
                  REPO="${{ github.repository }}"

                  # Determine prerelease flag
                  PRE_FLAG=""
                  if echo "${TAG}" | grep -qE '(alpha|beta|rc)'; then
                    PRE_FLAG="--prerelease"
                  fi

                  # Create or update release
                  # --verify-tag: never auto-create tags (tag must exist from build job)
                  # --clobber: overwrite existing assets on retry
                  if gh release view "${TAG}" --repo "${REPO}" > /dev/null 2>&1; then
                    echo "[INFO] Release ${TAG} exists -- updating notes and uploading assets"
                    gh release edit "${TAG}" --repo "${REPO}" \
                      --title "CannaGuide ${TAG}" \
                      --notes "${NOTES}" ${PRE_FLAG}
                    gh release upload "${TAG}" "${ASSETS[@]}" --repo "${REPO}" --clobber
                  else
                    echo "[INFO] Creating new release ${TAG}"
                    gh release create "${TAG}" "${ASSETS[@]}" \
                      --repo "${REPO}" \
                      --title "CannaGuide ${TAG}" \
                      --notes "${NOTES}" \
                      --verify-tag ${PRE_FLAG}
                  fi

                  echo "[OK] Release ${TAG} published with build provenance + SBOM"
