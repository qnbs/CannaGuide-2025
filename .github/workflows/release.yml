name: Release

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: write
    pull-requests: write

jobs:
    release-please:
        name: Release Please
        runs-on: ubuntu-latest
        timeout-minutes: 10
        outputs:
            release_created: ${{ steps.release.outputs.release_created }}
            tag_name: ${{ steps.release.outputs.tag_name }}
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
              with:
                  egress-policy: audit

            - name: Run release-please
              id: release
              uses: googleapis/release-please-action@a02a34c4d625f9be7cb89f4291f2343e4b830e87 # v4.2.0
              with:
                  release-type: node
                  target-branch: main
