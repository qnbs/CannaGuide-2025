name: Renovate

on:
    schedule:
        - cron: '0 3 * * *'
    workflow_dispatch:

permissions:
    contents: write
    pull-requests: write

jobs:
    renovate:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - name: Run Renovate
              uses: renovatebot/github-action@v40.1.4
              with:
                  configurationFile: .renovaterc.json
                  token: ${{ secrets.RENOVATE_TOKEN }}
