name: Renovate

# Runs on a weekly schedule and can be triggered manually.
# Requires RENOVATE_TOKEN secret (GitHub PAT with repo scope).
# Add token in Settings → Secrets → Actions.
on:
    workflow_dispatch:
    schedule:
        - cron: '0 4 * * 1' # Every Monday at 04:00 UTC

permissions:
    contents: write
    pull-requests: write

jobs:
    renovate:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - name: Run Renovate
              uses: renovatebot/github-action@v40.1.4
              env:
                  RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
              if: env.RENOVATE_TOKEN != ''
              with:
                  configurationFile: .renovaterc.json
                  token: ${{ secrets.RENOVATE_TOKEN }}
