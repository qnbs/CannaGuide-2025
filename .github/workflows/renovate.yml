name: Renovate

# Runs on a weekly schedule and can be triggered manually.
# Requires GH_ADMIN secret (GitHub PAT with repo + workflow scope).
# Add token in Settings -> Secrets -> Actions.
on:
    workflow_dispatch:
    schedule:
        - cron: '0 4 * * 1' # Every Monday at 04:00 UTC

permissions:
    contents: write
    pull-requests: write

jobs:
    renovate:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Run Renovate
              if: ${{ env.HAS_TOKEN == 'true' }}
              uses: renovatebot/github-action@v44.2.6
              env:
                  RENOVATE_TOKEN: ${{ secrets.GH_ADMIN }}
                  LOG_LEVEL: debug
              with:
                  configurationFile: .renovaterc.json
                  token: ${{ secrets.GH_ADMIN }}
        env:
            HAS_TOKEN: ${{ secrets.GH_ADMIN != '' }}
