name: Renovate

# Disabled: requires RENOVATE_TOKEN secret to be configured.
# Add token in Settings → Secrets → Actions, then switch triggers back.
on:
    workflow_dispatch:

permissions:
    contents: write
    pull-requests: write

jobs:
    renovate:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - name: Run Renovate
              uses: renovatebot/github-action@v40.1.4
              env:
                  RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
              if: env.RENOVATE_TOKEN != ''
              with:
                  configurationFile: .renovaterc.json
                  token: ${{ secrets.RENOVATE_TOKEN }}
