name: Security Alerts Handoff

on:
    workflow_dispatch:
    schedule:
        - cron: '17 6 * * *'

permissions:
    contents: write
    security-events: read
    actions: read

env:
    NODE_VERSION: '20'

jobs:
    refresh-security-alert-report:
        name: Refresh security alert report
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node ${{ env.NODE_VERSION }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Generate security report
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  REPO_OWNER: ${{ github.repository_owner }}
                  REPO_NAME: ${{ github.event.repository.name }}
                  REPO_BRANCH: main
              run: node ./scripts/security/update-alerts-report.mjs

            - name: Commit report when changed
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  if git diff --quiet -- docs/security-alerts-status.md; then
                    echo "No report changes detected"
                    exit 0
                  fi
                  git add docs/security-alerts-status.md
                  git commit -m "docs(security): refresh automated alerts report"
                  git push
