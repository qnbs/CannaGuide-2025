name: Security Alerts Handoff

on:
    workflow_dispatch:
    schedule:
        - cron: '17 6 * * *'

concurrency:
    group: security-alerts-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    NODE_VERSION: '20'

jobs:
    refresh-security-alert-report:
        name: Refresh security alert report
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: write
            security-events: read
            actions: read
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Setup Node ${{ env.NODE_VERSION }}
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Generate security report
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  REPO_OWNER: ${{ github.repository_owner }}
                  REPO_NAME: ${{ github.event.repository.name }}
                  REPO_BRANCH: main
              run: node ./scripts/security/update-alerts-report.mjs

            - name: Commit and push if changed
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add docs/security-alerts-status.md docs/security-alerts-badge.json
                  git diff --cached --quiet && echo "No changes to commit" && exit 0
                  git commit -m "docs(security): refresh automated alerts report"
                  git push
