name: Security Alerts Handoff

on:
    workflow_dispatch:
    schedule:
        - cron: '17 6 * * *'

concurrency:
    group: security-alerts-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: write
    security-events: read
    actions: read
    pull-requests: write

env:
    NODE_VERSION: '20'

jobs:
    refresh-security-alert-report:
        name: Refresh security alert report
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  persist-credentials: false

            - name: Setup Node ${{ env.NODE_VERSION }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Generate security report
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  REPO_OWNER: ${{ github.repository_owner }}
                  REPO_NAME: ${{ github.event.repository.name }}
                  REPO_BRANCH: main
              run: node ./scripts/security/update-alerts-report.mjs

            - name: Create update PR when report changed
              uses: peter-evans/create-pull-request@v7
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  commit-message: 'docs(security): refresh automated alerts report'
                  title: 'docs(security): refresh automated alerts report'
                  body: |
                      Automated refresh of `docs/security-alerts-status.md`.

                      Source:
                      - `.github/workflows/security-alerts-handoff.yml`
                      - `scripts/security/update-alerts-report.mjs`
                  branch: automation/security-alerts-handoff
                  delete-branch: true
                  add-paths: |
                      docs/security-alerts-status.md
                  labels: |
                      security
                      automation
