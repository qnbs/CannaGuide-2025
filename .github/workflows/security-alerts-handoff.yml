name: Security Alerts Handoff

on:
    workflow_dispatch:
    schedule:
        - cron: '17 6 * * *'

concurrency:
    group: security-alerts-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    NODE_VERSION: '20'

jobs:
    refresh-security-alert-report:
        name: Refresh security alert report
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: write
            security-events: read
            actions: read
            pull-requests: write
        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
              with:
                  persist-credentials: false

            - name: Setup Node ${{ env.NODE_VERSION }}
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Generate security report
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  REPO_OWNER: ${{ github.repository_owner }}
                  REPO_NAME: ${{ github.event.repository.name }}
                  REPO_BRANCH: main
              run: node ./scripts/security/update-alerts-report.mjs

            - name: Create update PR when report changed
              uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  commit-message: 'docs(security): refresh automated alerts report'
                  title: 'docs(security): refresh automated alerts report'
                  body: |
                      Automated refresh of `docs/security-alerts-status.md`.

                      Source:
                      - `.github/workflows/security-alerts-handoff.yml`
                      - `scripts/security/update-alerts-report.mjs`
                  branch: automation/security-alerts-handoff
                  delete-branch: true
                  add-paths: |
                      docs/security-alerts-status.md
                  labels: |
                      security
                      automation
