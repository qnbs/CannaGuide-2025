name: Security Full

# Disabled: SARIF upload (CodeQL, Trivy, Scorecard) requires Code Scanning
# to be enabled in GitHub repo settings. Run manually after enabling.
on:
    workflow_dispatch:

permissions:
    actions: read
    contents: read
    security-events: write

env:
    NODE_VERSION: '20'

jobs:
    codeql:
        name: CodeQL
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - name: Checkout repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

            - name: Initialize CodeQL
              uses: github/codeql-action/init@ebcb5b36ded6beda4ceefea6a8bc4cc885255bb3
              with:
                  languages: javascript-typescript
                  config: |
                      paths-ignore:
                          - dist
                          - node_modules
                          - coverage

            - name: Setup Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci --prefer-offline

            - name: Build for CodeQL analysis
              continue-on-error: true
              run: npm run build

            - name: Perform CodeQL analysis
              uses: github/codeql-action/analyze@ebcb5b36ded6beda4ceefea6a8bc4cc885255bb3

    dependabot-check:
        name: Dependabot Check
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

            - name: Setup Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci --prefer-offline

            - name: Audit npm dependencies
              continue-on-error: true
              run: npm audit --audit-level=high

    gitleaks:
        name: Gitleaks
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - name: Checkout repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
              with:
                  fetch-depth: 0

            - name: Run Gitleaks
              uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc
              continue-on-error: true
              env:
                  GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
              with:
                  args: detect --source . --no-banner --redact --config .gitleaks.toml

    trivy:
        name: Trivy
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - name: Checkout repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

            - name: Run Trivy filesystem scan
              uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
              with:
                  scan-type: fs
                  scan-ref: .
                  scanners: secret,misconfig,vuln
                  severity: HIGH,CRITICAL
                  format: sarif
                  output: trivy-results.sarif

            - name: Upload Trivy results
              uses: github/codeql-action/upload-sarif@ebcb5b36ded6beda4ceefea6a8bc4cc885255bb3
              if: always()
              with:
                  sarif_file: trivy-results.sarif

    semgrep:
        name: Semgrep
        runs-on: ubuntu-latest
        timeout-minutes: 25
        container:
            image: semgrep/semgrep
        steps:
            - name: Checkout repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

            - name: Run Semgrep
              run: semgrep scan --config auto --metrics=off --sarif -o semgrep-results.sarif

            - name: Upload Semgrep results
              uses: github/codeql-action/upload-sarif@ebcb5b36ded6beda4ceefea6a8bc4cc885255bb3
              if: always()
              with:
                  sarif_file: semgrep-results.sarif

    trojan-source:
        name: Anti Trojan Source
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

            - name: Setup Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci --prefer-offline

            - name: Scan for bidi controls
              run: npm run security:trojan-source

    scorecard:
        name: Scorecard
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            security-events: write
            id-token: write
            contents: read
            actions: read
        steps:
            - name: Checkout repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
              with:
                  fetch-depth: 0

            - name: Run Scorecard
              uses: ossf/scorecard-action@v2.4.0
              with:
                  results_file: scorecard-results.sarif
                  results_format: sarif
                  repo_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_results: true

            - name: Upload Scorecard results
              uses: github/codeql-action/upload-sarif@ebcb5b36ded6beda4ceefea6a8bc4cc885255bb3
              if: always()
              with:
                  sarif_file: scorecard-results.sarif
