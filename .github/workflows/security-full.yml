name: Security Full

# Disabled: SARIF upload (CodeQL, Scorecard) requires Code Scanning
# to be enabled in GitHub repo settings. Run manually after enabling.
on:
    workflow_dispatch:

permissions:
    contents: read

env:
    NODE_VERSION: '20'

jobs:
    codeql:
        name: CodeQL
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
            contents: read
            actions: read
            security-events: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Initialize CodeQL
              uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
              with:
                  languages: javascript-typescript
                  config: |
                      paths-ignore:
                          - dist
                          - node_modules
                          - coverage

            - name: Enable Corepack
              run: corepack enable

            - name: Setup Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build for CodeQL analysis
              run: pnpm run build

            - name: Perform CodeQL analysis
              uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1

    dependabot-check:
        name: Dependabot Check
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Enable Corepack
              run: corepack enable

            - name: Setup Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Audit dependencies
              run: |
                  pnpm audit --audit-level=high 2>&1 || {
                    echo "[WARN] pnpm audit found high-severity vulnerabilities -- review output above"
                    echo "Run 'pnpm audit' locally and update affected packages"
                  }

    gitleaks:
        name: Gitleaks
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - name: Checkout repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  fetch-depth: 0

            - name: Run Gitleaks
              run: |
                  GITLEAKS_VERSION="8.24.3"
                  curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
                    | tar -xz -C /usr/local/bin gitleaks
                  gitleaks detect --source . --no-banner --redact --config .gitleaks.toml -v

    grype:
        name: Grype Vulnerability Scan
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: read
            security-events: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Run Grype filesystem scan
              uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
              id: grype
              with:
                  path: .
                  fail-build: false
                  severity-cutoff: high
                  output-format: sarif

            - name: Upload Grype SARIF
              if: always() && steps.grype.outputs.sarif != ''
              uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
              with:
                  sarif_file: ${{ steps.grype.outputs.sarif }}
                  category: grype-filesystem

    semgrep:
        name: Semgrep
        runs-on: ubuntu-latest
        timeout-minutes: 25
        permissions:
            contents: read
            security-events: write
        container:
            image: semgrep/semgrep
        steps:
            - name: Checkout repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Run Semgrep
              run: semgrep scan --config auto --metrics=off --sarif -o semgrep-results.sarif

            - name: Upload Semgrep results
              uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
              if: always()
              with:
                  sarif_file: semgrep-results.sarif

    trojan-source:
        name: Anti Trojan Source
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Enable Corepack
              run: corepack enable

            - name: Setup Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Scan for bidi controls
              run: pnpm run security:trojan-source

    scorecard:
        name: Scorecard
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            security-events: write
            id-token: write
            contents: read
            actions: read
        steps:
            - name: Checkout repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  fetch-depth: 0

            - name: Run Scorecard
              uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
              with:
                  results_file: scorecard-results.sarif
                  results_format: sarif
                  repo_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_results: true

            - name: Upload Scorecard results
              uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
              if: always()
              with:
                  sarif_file: scorecard-results.sarif
