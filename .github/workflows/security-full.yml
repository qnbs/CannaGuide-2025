name: Security Full

# Disabled: SARIF upload (CodeQL, Scorecard) requires Code Scanning
# to be enabled in GitHub repo settings. Run manually after enabling.
on:
    workflow_dispatch:

permissions:
    contents: read

env:
    NODE_VERSION: '20'

jobs:
    codeql:
        name: CodeQL
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
            contents: read
            actions: read
            security-events: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Initialize CodeQL
              uses: github/codeql-action/init@ebcb5b36ded6beda4ceefea6a8bc4cc885255bb3
              with:
                  languages: javascript-typescript
                  config: |
                      paths-ignore:
                          - dist
                          - node_modules
                          - coverage

            - name: Setup Node
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci --prefer-offline

            - name: Build for CodeQL analysis
              continue-on-error: true
              run: npm run build

            - name: Perform CodeQL analysis
              uses: github/codeql-action/analyze@ebcb5b36ded6beda4ceefea6a8bc4cc885255bb3

    dependabot-check:
        name: Dependabot Check
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Setup Node
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci --prefer-offline

            - name: Audit npm dependencies
              continue-on-error: true
              run: npm audit --audit-level=high

    gitleaks:
        name: Gitleaks
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  fetch-depth: 0

            - name: Run Gitleaks
              run: |
                  GITLEAKS_VERSION="8.24.3"
                  curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
                    | tar -xz -C /usr/local/bin gitleaks
                  gitleaks detect --source . --no-banner --redact --config .gitleaks.toml -v

    grype:
        name: Grype Vulnerability Scan
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: read
            security-events: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Run Grype filesystem scan
              uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
              id: grype
              with:
                  path: .
                  fail-build: false
                  severity-cutoff: high
                  output-format: sarif

            - name: Upload Grype SARIF
              if: always() && steps.grype.outputs.sarif != ''
              uses: github/codeql-action/upload-sarif@ebcb5b36ded6beda4ceefea6a8bc4cc885255bb3
              with:
                  sarif_file: ${{ steps.grype.outputs.sarif }}
                  category: grype-filesystem

    semgrep:
        name: Semgrep
        runs-on: ubuntu-latest
        timeout-minutes: 25
        permissions:
            contents: read
            security-events: write
        container:
            image: semgrep/semgrep
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Run Semgrep
              run: semgrep scan --config auto --metrics=off --sarif -o semgrep-results.sarif

            - name: Upload Semgrep results
              uses: github/codeql-action/upload-sarif@ebcb5b36ded6beda4ceefea6a8bc4cc885255bb3
              if: always()
              with:
                  sarif_file: semgrep-results.sarif

    trojan-source:
        name: Anti Trojan Source
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Setup Node
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci --prefer-offline

            - name: Scan for bidi controls
              run: npm run security:trojan-source

    scorecard:
        name: Scorecard
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            security-events: write
            id-token: write
            contents: read
            actions: read
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  fetch-depth: 0

            - name: Run Scorecard
              uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46 # v2.4.0
              with:
                  results_file: scorecard-results.sarif
                  results_format: sarif
                  repo_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_results: true

            - name: Upload Scorecard results
              uses: github/codeql-action/upload-sarif@ebcb5b36ded6beda4ceefea6a8bc4cc885255bb3
              if: always()
              with:
                  sarif_file: scorecard-results.sarif
