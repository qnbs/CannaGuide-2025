name: Security Scan

# Disabled: requires external toolchain (Snyk token, Socket.dev, Aikido,
# pre-commit, Go, Python). Run manually after configuring secrets.
on:
    workflow_dispatch:

permissions:
    contents: read

jobs:
    scan:
        name: Glassworm Security Sweep
        runs-on: ubuntu-latest
        timeout-minutes: 45
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.12'

            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version: '1.24'

            - name: Install local toolchain
              run: |
                  npm ci
                  python -m pip install --upgrade pip
                  python -m pip install --break-system-packages pre-commit semgrep
                  go install github.com/zricethezav/gitleaks/v8@latest
                  go install github.com/ossf/scorecard/v5@latest
                  go install github.com/aquasecurity/trivy/cmd/trivy@latest

            - name: Aikido Safe Chain setup
              continue-on-error: true
              run: npx @aikidosec/safe-chain setup-ci

            - name: Run pre-commit hooks
              continue-on-error: true
              run: pre-commit run --all-files

            - name: Trojan source scan
              run: npm run security:trojan-source

            - name: ESLint security pass
              run: npm run security:eslint

            - name: Gitleaks secret scan
              run: npm run security:secrets

            - name: Semgrep scan
              run: npm run security:semgrep

            - name: Socket.dev dependency scan
              continue-on-error: true
              run: npm run security:socket

            - name: Snyk dependency scan
              continue-on-error: true
              env:
                  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
              run: |
                  if [ -z "$SNYK_TOKEN" ]; then
                    echo "⚠ SNYK_TOKEN not set – skipping Snyk scan"
                    exit 0
                  fi
                  npm run security:snyk

            - name: Trivy filesystem scan
              run: npm run security:trivy

            - name: Scorecard local scan
              continue-on-error: true
              run: npm run security:scorecard
