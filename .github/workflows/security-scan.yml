name: Security Scan

# Disabled: requires external toolchain (Snyk token, Socket.dev, Aikido,
# pre-commit, Go, Python). Run manually after configuring secrets.
on:
    workflow_dispatch:

permissions:
    contents: read

env:
    NODE_VERSION: '20'

jobs:
    scan:
        name: Glassworm Security Sweep
        runs-on: ubuntu-latest
        timeout-minutes: 45
        steps:
            - name: Checkout repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  fetch-depth: 0

            - name: Enable Corepack
              run: corepack enable

            - name: Setup Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run pre-commit hooks
              run: |
                  if command -v pre-commit >/dev/null 2>&1; then
                    pre-commit run --all-files
                  else
                    echo "[SKIP] pre-commit not installed -- install via 'pip install pre-commit'"
                  fi

            - name: Trojan source scan
              run: pnpm run security:trojan-source

            - name: ESLint security pass
              run: pnpm run security:eslint

            - name: Gitleaks secret scan
              run: |
                  GITLEAKS_VERSION="8.24.3"
                  curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
                    | tar -xz -C /usr/local/bin gitleaks
                  gitleaks detect --source . --no-banner --redact --config .gitleaks.toml -v

            - name: Semgrep scan
              run: |
                  if command -v semgrep >/dev/null 2>&1; then
                    pnpm run security:semgrep
                  elif command -v pip3 >/dev/null 2>&1; then
                    pip3 install --quiet semgrep==1.67.0
                    pnpm run security:semgrep
                  else
                    echo "[SKIP] Semgrep not available -- install via 'pip install semgrep'"
                  fi

            - name: Socket.dev dependency scan
              run: |
                  if pnpm run security:socket --if-present 2>/dev/null; then
                    echo "[OK] Socket.dev scan complete"
                  else
                    echo "[SKIP] Socket.dev scan not configured or unavailable"
                  fi

            - name: Snyk dependency scan
              env:
                  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
              run: |
                  if [ -z "$SNYK_TOKEN" ]; then
                    echo "[SKIP] SNYK_TOKEN not set -- configure the secret to enable Snyk"
                    exit 0
                  fi
                  pnpm run security:snyk

            # Trivy removed 2026-03-24: supply-chain attack (GHSA-69fq-xp46-6x23).
            # Replaced by Grype in docker.yml (image) + security-full.yml (filesystem).
            # This sweep relies on Snyk + pnpm audit + Gitleaks + Semgrep above.

            - name: Scorecard local scan
              uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
              with:
                  results_file: scorecard-results.sarif
                  results_format: sarif
                  repo_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_results: false
