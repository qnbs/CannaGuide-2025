name: Security Scan

# Disabled: requires external toolchain (Snyk token, Socket.dev, Aikido,
# pre-commit, Go, Python). Run manually after configuring secrets.
on:
    workflow_dispatch:

permissions:
    contents: read

env:
    NODE_VERSION: '20'

jobs:
    scan:
        name: Glassworm Security Sweep
        runs-on: ubuntu-latest
        timeout-minutes: 45
        steps:
            - name: Checkout repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
              with:
                  fetch-depth: 0

            - name: Setup Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci --prefer-offline

            - name: Aikido Safe Chain setup
              continue-on-error: true
              run: npx @aikidosec/safe-chain setup-ci

            - name: Run pre-commit hooks
              continue-on-error: true
              run: pre-commit run --all-files

            - name: Trojan source scan
              run: npm run security:trojan-source

            - name: ESLint security pass
              run: npm run security:eslint

            - name: Gitleaks secret scan
              run: npm run security:secrets

            - name: Semgrep scan
              continue-on-error: true
              run: npm run security:semgrep

            - name: Socket.dev dependency scan
              continue-on-error: true
              run: npm run security:socket

            - name: Snyk dependency scan
              continue-on-error: true
              env:
                  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
              run: |
                  if [ -z "$SNYK_TOKEN" ]; then
                    echo "⚠ SNYK_TOKEN not set – skipping Snyk scan"
                    exit 0
                  fi
                  npm run security:snyk

            # Trivy removed 2026-03-24: supply-chain attack (GHSA-69fq-xp46-6x23).
            # Filesystem scanning covered by Snyk + npm audit + Gitleaks + Semgrep above.

            - name: Scorecard local scan
              continue-on-error: true
              uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46 # v2.4.0
              with:
                  results_file: scorecard-results.sarif
                  results_format: sarif
                  repo_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_results: false
