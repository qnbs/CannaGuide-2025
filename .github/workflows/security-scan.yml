name: Security Scan

# Disabled: requires external toolchain (Snyk token, Socket.dev, Aikido,
# pre-commit, Go, Python). Run manually after configuring secrets.
on:
    workflow_dispatch:

permissions:
    contents: read

env:
    NODE_VERSION: '20'

jobs:
    scan:
        name: Glassworm Security Sweep
        runs-on: ubuntu-latest
        timeout-minutes: 45
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  fetch-depth: 0

            - name: Setup Node
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci --prefer-offline

            - name: Aikido Safe Chain setup
              continue-on-error: true
              run: npx @aikidosec/safe-chain setup-ci

            - name: Run pre-commit hooks
              continue-on-error: true
              run: pre-commit run --all-files

            - name: Trojan source scan
              run: npm run security:trojan-source

            - name: ESLint security pass
              run: npm run security:eslint

            - name: Gitleaks secret scan
              run: |
                  GITLEAKS_VERSION="8.24.3"
                  curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
                    | tar -xz -C /usr/local/bin gitleaks
                  gitleaks detect --source . --no-banner --redact --config .gitleaks.toml -v

            - name: Semgrep scan
              continue-on-error: true
              run: npm run security:semgrep

            - name: Socket.dev dependency scan
              continue-on-error: true
              run: npm run security:socket

            - name: Snyk dependency scan
              continue-on-error: true
              env:
                  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
              run: |
                  if [ -z "$SNYK_TOKEN" ]; then
                    echo "[WARN] SNYK_TOKEN not set -- skipping Snyk scan"
                    exit 0
                  fi
                  npm run security:snyk

            # Trivy removed 2026-03-24: supply-chain attack (GHSA-69fq-xp46-6x23).
            # Replaced by Grype in docker.yml (image) + security-full.yml (filesystem).
            # This sweep relies on Snyk + npm audit + Gitleaks + Semgrep above.

            - name: Scorecard local scan
              continue-on-error: true
              uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
              with:
                  results_file: scorecard-results.sarif
                  results_format: sarif
                  repo_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_results: false
