name: Snyk Security

# Advisory weekly scan. Primary gates: CodeQL + Grype + Semgrep + pnpm audit.
# PR checks use the Snyk GitHub App (security/snyk). This workflow uploads
# Open Source SARIF when SNYK_TOKEN is set. See docs/code-scanning-setup.md

on:
    schedule:
        - cron: '0 2 * * 1'
    workflow_dispatch:

concurrency:
    group: snyk-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    snyk:
        name: Snyk Security Scan
        runs-on: ubuntu-latest
        timeout-minutes: 20
        continue-on-error: true
        permissions:
            contents: read
            security-events: write
        steps:
            - name: Detect SNYK_TOKEN
              id: snyk-token
              run: |
                  if [ -n "${{ secrets.SNYK_TOKEN }}" ]; then
                    echo "present=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "present=false" >> "$GITHUB_OUTPUT"
                    echo "::notice::SNYK_TOKEN not configured — weekly Snyk workflow skipped (advisory)."
                  fi

            - name: Harden runner
              if: steps.snyk-token.outputs.present == 'true'
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Checkout
              if: steps.snyk-token.outputs.present == 'true'
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Setup Node + install dependencies
              if: steps.snyk-token.outputs.present == 'true'
              uses: ./.github/actions/setup-node-ci

            - name: Snyk Open Source scan
              id: snyk-scan
              if: steps.snyk-token.outputs.present == 'true'
              continue-on-error: true
              uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
              env:
                  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
              with:
                  args: --severity-threshold=high --sarif-file-output=snyk-results.sarif --all-projects

            - name: Snyk Monitor (track vulnerabilities)
              if: steps.snyk-token.outputs.present == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.snyk-scan.outcome == 'success'
              continue-on-error: true
              uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
              env:
                  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
              with:
                  command: monitor
                  args: --all-projects

            - name: Upload Snyk SARIF
              if: steps.snyk-token.outputs.present == 'true' && steps.snyk-scan.outcome == 'success' && hashFiles('snyk-results.sarif') != ''
              continue-on-error: true
              uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
              with:
                  sarif_file: snyk-results.sarif
                  category: snyk-open-source
