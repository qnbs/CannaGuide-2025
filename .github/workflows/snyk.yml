name: Snyk Security

# Advisory-only weekly scan. Non-blocking (continue-on-error) because
# Snyk has intermittent 503 outages that must not break CI.
# Primary security scanning is handled by CodeQL + Grype + Semgrep.
# Requires SNYK_TOKEN secret from Snyk App integration.
on:
    schedule:
        - cron: '0 6 * * 1' # Every Monday at 06:00 UTC
    workflow_dispatch:

concurrency:
    group: snyk-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    NODE_VERSION: '24'
    HAS_TOKEN: ${{ secrets.SNYK_TOKEN != '' }}

jobs:
    snyk:
        name: Snyk Security Scan
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: read
            security-events: write
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Enable Corepack
              run: corepack enable

            - name: Setup Node ${{ env.NODE_VERSION }}
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Snyk Open Source scan
              if: ${{ env.HAS_TOKEN == 'true' }}
              id: snyk-scan
              continue-on-error: true # Advisory-only -- transient Snyk 503s must not fail CI
              uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
              env:
                  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
              with:
                  args: --severity-threshold=high --sarif-file-output=snyk-results.sarif --all-projects

            - name: Snyk Monitor (track vulnerabilities)
              if: ${{ env.HAS_TOKEN == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.snyk-scan.outcome == 'success' }}
              continue-on-error: true # Advisory-only -- transient Snyk 502s must not fail CI
              uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
              env:
                  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
              with:
                  command: monitor
                  args: --all-projects

            - name: Upload Snyk SARIF
              if: ${{ env.HAS_TOKEN == 'true' && always() && steps.snyk-scan.outcome == 'success' }}
              uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
              with:
                  sarif_file: snyk-results.sarif

            - name: Skip notice (no token)
              if: ${{ env.HAS_TOKEN != 'true' }}
              run: echo "[WARN] SNYK_TOKEN not configured -- skipping Snyk scan. Install the Snyk GitHub App or add the token as a repository secret."

        env:
            HAS_TOKEN: ${{ secrets.SNYK_TOKEN != '' }}
