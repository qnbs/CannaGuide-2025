name: Snyk Security

# Advisory-only weekly scan. Non-blocking (continue-on-error) because
# Snyk has intermittent 503 outages that must not break CI.
# Primary security scanning is handled by CodeQL + Grype + Semgrep.
# Requires SNYK_TOKEN secret from Snyk App integration.
on:
    schedule:
        - cron: '0 6 * * 1' # Every Monday at 06:00 UTC
    workflow_dispatch:

concurrency:
    group: snyk-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    NODE_VERSION: '24'

jobs:
    snyk-skipped:
        name: Snyk skipped (no token)
        if: ${{ secrets.SNYK_TOKEN == '' }}
        runs-on: ubuntu-latest
        steps:
            - run: |
                  echo "::notice::SNYK_TOKEN not configured — weekly Snyk workflow skipped (advisory only)."
                  echo "Install the Snyk GitHub App or add SNYK_TOKEN as a repository secret."

    snyk:
        name: Snyk Security Scan
        if: ${{ secrets.SNYK_TOKEN != '' }}
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: read
            security-events: write
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Enable Corepack
              run: corepack enable

            - name: Setup Node ${{ env.NODE_VERSION }}
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Snyk Open Source scan
              id: snyk-scan
              continue-on-error: true # Advisory-only -- transient Snyk 503s must not fail CI
              uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
              env:
                  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
              with:
                  args: --severity-threshold=high --sarif-file-output=snyk-results.sarif --all-projects

            - name: Snyk Monitor (track vulnerabilities)
              if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.snyk-scan.outcome == 'success' }}
              continue-on-error: true # Advisory-only -- transient Snyk 502s must not fail CI
              uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
              env:
                  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
              with:
                  command: monitor
                  args: --all-projects

            - name: Upload Snyk SARIF
              if: ${{ always() && steps.snyk-scan.outcome == 'success' }}
              uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
              with:
                  sarif_file: snyk-results.sarif
