name: Snyk Security

# Runs on PRs (advisory) and weekly for continuous monitoring.
# Requires SNYK_TOKEN secret from Snyk App integration.
on:
    pull_request:
        branches: [main]
    schedule:
        - cron: '0 6 * * 1' # Every Monday at 06:00 UTC
    workflow_dispatch:

concurrency:
    group: snyk-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    NODE_VERSION: '20'

jobs:
    snyk:
        name: Snyk Security Scan
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: read
            security-events: write
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Setup Node ${{ env.NODE_VERSION }}
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci --prefer-offline

            - name: Snyk Open Source scan
              if: ${{ env.HAS_TOKEN == 'true' }}
              uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04
              continue-on-error: true
              env:
                  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
              with:
                  args: --severity-threshold=high --sarif-file-output=snyk-results.sarif

            - name: Upload Snyk SARIF
              if: ${{ env.HAS_TOKEN == 'true' && always() }}
              uses: github/codeql-action/upload-sarif@ebcb5b36ded6beda4ceefea6a8bc4cc885255bb3
              with:
                  sarif_file: snyk-results.sarif

            - name: Skip notice (no token)
              if: ${{ env.HAS_TOKEN != 'true' }}
              run: echo "[WARN] SNYK_TOKEN not configured -- skipping Snyk scan. Install the Snyk GitHub App or add the token as a repository secret."

        env:
            HAS_TOKEN: ${{ secrets.SNYK_TOKEN != '' }}
