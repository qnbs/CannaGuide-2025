name: Snyk Security

# Runs on PRs (advisory) and weekly for continuous monitoring.
# Requires SNYK_TOKEN secret from Snyk App integration.
on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    schedule:
        - cron: '0 6 * * 1' # Every Monday at 06:00 UTC
    workflow_dispatch:

concurrency:
    group: snyk-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    NODE_VERSION: '20'

jobs:
    snyk:
        name: Snyk Security Scan
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: read
            security-events: write
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Setup Node ${{ env.NODE_VERSION }}
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci --prefer-offline

            - name: Snyk Open Source scan
              if: ${{ env.HAS_TOKEN == 'true' }}
              id: snyk-scan
              uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04
              env:
                  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
              with:
                  args: --severity-threshold=high --sarif-file-output=snyk-results.sarif --all-projects

            - name: Snyk Monitor (track vulnerabilities)
              if: ${{ env.HAS_TOKEN == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.snyk-scan.outcome == 'success' }}
              uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04
              env:
                  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
              with:
                  command: monitor
                  args: --all-projects

            - name: Upload Snyk SARIF
              if: ${{ env.HAS_TOKEN == 'true' && always() && steps.snyk-scan.outcome != 'skipped' }}
              uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
              with:
                  sarif_file: snyk-results.sarif

            - name: Skip notice (no token)
              if: ${{ env.HAS_TOKEN != 'true' }}
              run: echo "[WARN] SNYK_TOKEN not configured -- skipping Snyk scan. Install the Snyk GitHub App or add the token as a repository secret."

        env:
            HAS_TOKEN: ${{ secrets.SNYK_TOKEN != '' }}
