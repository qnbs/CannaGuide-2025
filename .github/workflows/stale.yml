name: Stale Issues and Pull Requests

on:
    schedule:
        - cron: '0 7 * * 1'
    workflow_dispatch:

permissions: {}

jobs:
    stale:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            issues: write
            pull-requests: write
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
              with:
                  egress-policy: audit

            - name: Mark stale items
              uses: actions/stale@1e223db275d687790206a7acac4d1a11bd6fe629 # v10.4.0
              with:
                  stale-issue-message: 'This issue has been marked stale because there has been no recent activity.'
                  stale-pr-message: 'This pull request has been marked stale because there has been no recent activity.'
                  days-before-stale: 30
                  days-before-close: 14
                  stale-issue-label: stale
                  stale-pr-label: stale
                  exempt-issue-labels: security,enhancement,good first issue
                  exempt-pr-labels: security
