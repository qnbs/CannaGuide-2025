name: Stale Issues and Pull Requests

on:
    schedule:
        - cron: '0 7 * * 1'
    workflow_dispatch:

permissions: {}

jobs:
    stale:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            issues: write
            pull-requests: write
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
              with:
                  egress-policy: audit

            - name: Mark stale items
              uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10.3.0
              with:
                  stale-issue-message: 'This issue has been marked stale because there has been no recent activity.'
                  stale-pr-message: 'This pull request has been marked stale because there has been no recent activity.'
                  days-before-stale: 30
                  days-before-close: 14
                  stale-issue-label: stale
                  stale-pr-label: stale
                  exempt-issue-labels: security,enhancement,good first issue
                  exempt-pr-labels: security
