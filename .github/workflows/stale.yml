name: Stale Issues and Pull Requests

on:
    schedule:
        - cron: '0 7 * * 1'
    workflow_dispatch:

permissions: {}

jobs:
    stale:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            issues: write
            pull-requests: write
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
              with:
                  egress-policy: audit

            - name: Mark stale items
              uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9.1.0
              with:
                  stale-issue-message: 'This issue has been marked stale because there has been no recent activity.'
                  stale-pr-message: 'This pull request has been marked stale because there has been no recent activity.'
                  days-before-stale: 30
                  days-before-close: 14
                  stale-issue-label: stale
                  stale-pr-label: stale
                  exempt-issue-labels: security,enhancement,good first issue
                  exempt-pr-labels: security
