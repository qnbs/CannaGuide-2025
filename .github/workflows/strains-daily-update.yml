name: Daily Strain Catalog Sync

on:
    # schedule paused -- no external strain source since SeedFinder API shutdown (mid-2024).
    # Client-side Daily Drop (dailyStrainsService.ts) works independently via seeded PRNG.
    # Re-enable when an external strain feed is integrated.
    # schedule:
    #     - cron: '20 4 * * *'
    workflow_dispatch:

permissions:
    contents: read

env:
    NODE_VERSION: '24'

concurrency:
    group: strains-catalog-update
    cancel-in-progress: true

jobs:
    update-catalog:
        name: Validate & Sync Strain Catalog
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: write
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0

            - name: Enable Corepack
              run: corepack enable

            - name: Setup Node ${{ env.NODE_VERSION }}
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Extract strains.json from TS sources
              run: node scripts/extract-strains-to-json.mjs

            - name: Generate TS files from strains.json
              run: node scripts/generate-strain-files.mjs

            - name: Check for duplicate IDs
              env:
                  BASE_REF: origin/main
              run: pnpm run strains:check-new-duplicates

            - name: Typecheck
              run: pnpm run typecheck

            - name: Commit updated catalog (if changed)
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add apps/web/data/strains/ || true
                  if git diff --cached --quiet; then
                    echo "Strain catalog is already in sync."
                  else
                    git commit -m "chore(strains): daily catalog sync $(date -u +%Y-%m-%d)"
                    git push origin main
                  fi

            - name: Log catalog stats
              run: |
                  STRAIN_COUNT=$(grep -c '"id"' apps/web/data/strains/strains.json || echo "0")
                  echo "### Strain Catalog Sync" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
                  echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
                  echo "| Total strains | ${STRAIN_COUNT} |" >> "$GITHUB_STEP_SUMMARY"
                  echo "| strains.json | $(wc -l < apps/web/data/strains/strains.json) lines |" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
