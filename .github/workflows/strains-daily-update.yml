name: Daily Strain Catalog Sync

on:
    schedule:
        - cron: '20 4 * * *' # Daily at 04:20 UTC
    workflow_dispatch:

permissions:
    contents: read

env:
    NODE_VERSION: '20'

concurrency:
    group: strains-catalog-update
    cancel-in-progress: true

jobs:
    update-catalog:
        name: Validate & Sync Strain Catalog
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: write
        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  fetch-depth: 0

            - name: Enable Corepack
              run: corepack enable

            - name: Setup Node ${{ env.NODE_VERSION }}
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Extract strains.json from TS sources
              run: node scripts/extract-strains-to-json.mjs

            - name: Generate TS files from strains.json
              run: node scripts/generate-strain-files.mjs

            - name: Check for duplicate IDs
              env:
                  BASE_REF: origin/main
              run: pnpm run strains:check-new-duplicates

            - name: Typecheck
              run: pnpm run typecheck

            - name: Commit updated catalog (if changed)
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add apps/web/data/strains/ || true
                  if git diff --cached --quiet; then
                    echo "Strain catalog is already in sync."
                  else
                    git commit -m "chore(strains): daily catalog sync $(date -u +%Y-%m-%d)"
                    git push origin main
                  fi

            - name: Log catalog stats
              run: |
                  STRAIN_COUNT=$(grep -c '"id"' apps/web/data/strains/strains.json || echo "0")
                  echo "### Strain Catalog Sync" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
                  echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
                  echo "| Total strains | ${STRAIN_COUNT} |" >> "$GITHUB_STEP_SUMMARY"
                  echo "| strains.json | $(wc -l < apps/web/data/strains/strains.json) lines |" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
