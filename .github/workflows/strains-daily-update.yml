name: 🌿 Strain Catalog Update

on:
    workflow_dispatch:

permissions:
    contents: read

env:
    NODE_VERSION: '20'

concurrency:
    group: strains-catalog-update
    cancel-in-progress: true

jobs:
    update-catalog:
        name: 🧬 Merge & Validate Strain Catalog
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: write
        steps:
            - name: 📥 Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
              with:
                  fetch-depth: 0

            - name: ⚙ Setup Node ${{ env.NODE_VERSION }}
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: 📦 Install dependencies
              run: npm ci --prefer-offline

            - name: 🧬 Run strain merge (strict)
              env:
                  STRICT_STRAIN_MERGE: '1'
              run: npm run strains:merge

            - name: 📊 Upload merge report
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
              with:
                  name: strain-merge-report-${{ github.run_id }}
                  path: artifacts/strain-merge-report.json
                  retention-days: 30

            - name: 🔍 Check for duplicate IDs
              env:
                  BASE_REF: origin/main
              run: npm run strains:check-new-duplicates

            - name: 📈 Log catalog stats
              run: |
                  if [ -f artifacts/strain-merge-report.json ]; then
                    echo "### 🌿 Strain Catalog Report" >> "$GITHUB_STEP_SUMMARY"
                    echo "" >> "$GITHUB_STEP_SUMMARY"
                    echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
                    echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
                    echo "| Files scanned | $(jq '.filesScanned' artifacts/strain-merge-report.json) |" >> "$GITHUB_STEP_SUMMARY"
                    echo "| Total entries | $(jq '.totalEntries' artifacts/strain-merge-report.json) |" >> "$GITHUB_STEP_SUMMARY"
                    echo "| Unique entries | $(jq '.uniqueEntries' artifacts/strain-merge-report.json) |" >> "$GITHUB_STEP_SUMMARY"
                    echo "| Duplicates | $(jq '.duplicates | length' artifacts/strain-merge-report.json) |" >> "$GITHUB_STEP_SUMMARY"
                    echo "" >> "$GITHUB_STEP_SUMMARY"
                    echo "Generated at: $(jq -r '.generatedAt' artifacts/strain-merge-report.json)" >> "$GITHUB_STEP_SUMMARY"
                  fi
