name: Daily Strain Discovery & Catalog Update

on:
    schedule:
        - cron: '30 6 * * *' # Daily at 06:30 UTC
    workflow_dispatch:

permissions:
    contents: read

env:
    NODE_VERSION: '20'

concurrency:
    group: strains-catalog-update
    cancel-in-progress: true

jobs:
    update-catalog:
        name: Merge & Validate Strain Catalog
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: write
        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  fetch-depth: 0

            - name: Setup Node ${{ env.NODE_VERSION }}
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci --prefer-offline

            - name: Fetch new strains from SeedFinder API
              env:
                  VITE_SEEDFINDER_API_KEY: ${{ secrets.SEEDFINDER_API_KEY }}
              run: node scripts/fetch-daily-strains.mjs

            - name: Upload daily feed artifact
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: daily-strains-feed-${{ github.run_id }}
                  path: |
                      artifacts/daily-strains-feed.json
                      apps/web/data/strains/pending/pending-strains.json
                  retention-days: 90

            - name: Commit pending strains
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add apps/web/data/strains/pending/ artifacts/daily-strains-feed.json || true
                  if git diff --cached --quiet; then
                    echo "No new strain discoveries to commit."
                  else
                    git commit -m "chore(strains): daily strain discovery $(date -u +%Y-%m-%d)"
                    git push origin main
                  fi

            - name: Run strain merge (strict)
              env:
                  STRICT_STRAIN_MERGE: '1'
              run: npm run strains:merge

            - name: Upload merge report
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: strain-merge-report-${{ github.run_id }}
                  path: artifacts/strain-merge-report.json
                  retention-days: 30

            - name: Check for duplicate IDs
              env:
                  BASE_REF: origin/main
              run: npm run strains:check-new-duplicates

            - name: Log catalog stats
              run: |
                  if [ -f artifacts/daily-strains-feed.json ]; then
                    echo "### Daily Strain Discovery" >> "$GITHUB_STEP_SUMMARY"
                    echo "" >> "$GITHUB_STEP_SUMMARY"
                    echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
                    echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
                    echo "| New strains | $(jq '.stats.newStrains' artifacts/daily-strains-feed.json) |" >> "$GITHUB_STEP_SUMMARY"
                    echo "| Updated strains | $(jq '.stats.updatedStrains' artifacts/daily-strains-feed.json) |" >> "$GITHUB_STEP_SUMMARY"
                    echo "| Catalog size | $(jq '.stats.existingCatalogSize' artifacts/daily-strains-feed.json) |" >> "$GITHUB_STEP_SUMMARY"
                    echo "| Errors | $(jq '.stats.errors' artifacts/daily-strains-feed.json) |" >> "$GITHUB_STEP_SUMMARY"
                    echo "" >> "$GITHUB_STEP_SUMMARY"
                  fi
                  if [ -f artifacts/strain-merge-report.json ]; then
                    echo "### Strain Catalog Merge" >> "$GITHUB_STEP_SUMMARY"
                    echo "" >> "$GITHUB_STEP_SUMMARY"
                    echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
                    echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
                    echo "| Files scanned | $(jq '.filesScanned' artifacts/strain-merge-report.json) |" >> "$GITHUB_STEP_SUMMARY"
                    echo "| Total entries | $(jq '.totalEntries' artifacts/strain-merge-report.json) |" >> "$GITHUB_STEP_SUMMARY"
                    echo "| Unique entries | $(jq '.uniqueEntries' artifacts/strain-merge-report.json) |" >> "$GITHUB_STEP_SUMMARY"
                    echo "| Duplicates | $(jq '.duplicates | length' artifacts/strain-merge-report.json) |" >> "$GITHUB_STEP_SUMMARY"
                    echo "" >> "$GITHUB_STEP_SUMMARY"
                    echo "Generated at: $(jq -r '.generatedAt' artifacts/strain-merge-report.json)" >> "$GITHUB_STEP_SUMMARY"
                  fi
