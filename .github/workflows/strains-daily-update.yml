name: Daily Strain Catalog Sync

on:
    # schedule paused -- no external strain source since SeedFinder API shutdown (mid-2024).
    # Client-side Daily Drop (dailyStrainsService.ts) works independently via seeded PRNG.
    # Re-enable when an external strain feed is integrated.
    # schedule:
    #     - cron: '20 4 * * *'
    workflow_dispatch:

permissions:
    contents: read

env:
    NODE_VERSION: '24'

concurrency:
    group: strains-catalog-update
    cancel-in-progress: true

jobs:
    update-catalog:
        name: Validate & Sync Strain Catalog
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: write
            pull-requests: write
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0

            - name: Enable Corepack
              run: corepack enable

            - name: Setup Node ${{ env.NODE_VERSION }}
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Extract strains.json from TS sources
              run: node scripts/extract-strains-to-json.mjs

            - name: Generate TS files from strains.json
              run: node scripts/generate-strain-files.mjs

            - name: Check for duplicate IDs
              env:
                  BASE_REF: origin/main
              run: pnpm run strains:check-new-duplicates

            - name: Typecheck
              run: pnpm run typecheck

            - name: Commit updated catalog in automation branch (if changed)
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add apps/web/data/strains/ || true
                  if git diff --cached --quiet; then
                    echo "Strain catalog is already in sync."
                  else
                    BRANCH="automation/strains-sync-${{ github.run_id }}"
                    git checkout -b "$BRANCH"
                    git commit -m "chore(strains): daily catalog sync $(date -u +%Y-%m-%d)"
                    git push --set-upstream origin "$BRANCH"
                    gh pr create \
                      --base main \
                      --head "$BRANCH" \
                      --title "chore(strains): daily catalog sync $(date -u +%Y-%m-%d)" \
                      --body "Automated daily strains sync from workflow run ${{ github.run_id }}."
                  fi

            - name: Log catalog stats
              run: |
                  STRAIN_COUNT=$(grep -c '"id"' apps/web/data/strains/strains.json || echo "0")
                  echo "### Strain Catalog Sync" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
                  echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
                  echo "| Total strains | ${STRAIN_COUNT} |" >> "$GITHUB_STEP_SUMMARY"
                  echo "| strains.json | $(wc -l < apps/web/data/strains/strains.json) lines |" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
