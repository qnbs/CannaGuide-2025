name: Strain Catalog Merge Check

on:
    pull_request:
        branches: [main]
        paths:
            - 'data/strains/**'
            - 'scripts/merge-strains.mjs'
            - '.github/workflows/strains-merge.yml'
    workflow_dispatch:

concurrency:
    group: strains-merge-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    NODE_VERSION: '20'

jobs:
    merge-catalog:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0

            - name: Enable Corepack
              run: corepack enable

            - name: Setup Node
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Merge static strain catalog
              env:
                  STRICT_STRAIN_MERGE: '1'
              run: pnpm run strains:merge

            - name: Check for newly introduced duplicate IDs
              env:
                  BASE_REF: origin/${{ github.base_ref || 'main' }}
              run: pnpm run strains:check-new-duplicates

            - name: Upload merge report
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
              with:
                  name: strain-merge-report
                  path: artifacts/strain-merge-report.json
