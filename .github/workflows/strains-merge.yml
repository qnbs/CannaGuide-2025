name: Strain Catalog Merge Check

on:
    pull_request:
        branches: [main]
        paths:
            - 'data/strains/**'
            - 'scripts/merge-strains.mjs'
            - '.github/workflows/strains-merge.yml'
    workflow_dispatch:

permissions:
    contents: read

env:
    NODE_VERSION: '20'

jobs:
    merge-catalog:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  fetch-depth: 0

            - name: Setup Node
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci --prefer-offline

            - name: Merge static strain catalog
              run: npm run strains:merge

            - name: Check for newly introduced duplicate IDs
              env:
                  BASE_REF: origin/${{ github.base_ref || 'main' }}
              run: npm run strains:check-new-duplicates

            - name: Upload merge report
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
              with:
                  name: strain-merge-report
                  path: artifacts/strain-merge-report.json
