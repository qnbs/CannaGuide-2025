name: Strain Catalog Merge Check

on:
    pull_request:
        branches: [main]
        paths:
            - 'data/strains/**'
            - 'scripts/merge-strains.mjs'
            - '.github/workflows/strains-merge.yml'
    workflow_dispatch:

concurrency:
    group: strains-merge-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    NODE_VERSION: '24'

jobs:
    merge-catalog:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0

            - name: Enable Corepack
              run: corepack enable

            - name: Setup Node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Merge static strain catalog
              env:
                  STRICT_STRAIN_MERGE: '1'
              run: pnpm run strains:merge

            - name: Check for newly introduced duplicate IDs
              env:
                  BASE_REF: origin/${{ github.base_ref || 'main' }}
              run: pnpm run strains:check-new-duplicates

            - name: Upload merge report
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: strain-merge-report
                  path: artifacts/strain-merge-report.json
