name: Strain Catalog Merge Check

on:
    pull_request:
        branches: [main]
        paths:
            - 'data/strains/**'
            - 'scripts/merge-strains.mjs'
            - '.github/workflows/strains-merge.yml'
    workflow_dispatch:

concurrency:
    group: strains-merge-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    NODE_VERSION: '20'

jobs:
    merge-catalog:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  fetch-depth: 0

            - name: Setup Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci --prefer-offline

            - name: Merge static strain catalog
              run: npm run strains:merge

            - name: Check for newly introduced duplicate IDs
              env:
                  BASE_REF: origin/${{ github.base_ref || 'main' }}
              run: npm run strains:check-new-duplicates

            - name: Upload merge report
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: strain-merge-report
                  path: artifacts/strain-merge-report.json
