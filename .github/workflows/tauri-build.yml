name: Tauri Desktop Builds

on:
    push:
        tags: ['v*']
    workflow_dispatch:

permissions:
    contents: read

env:
    NODE_VERSION: '20'

concurrency:
    group: tauri-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    # ---------------------------------------------------------------------
    # Build frontend once, share across all Tauri matrix targets
    # ---------------------------------------------------------------------
    frontend:
        name: Build Frontend
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Build frontend
              run: npm run build

            - name: Upload dist artifact
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
              with:
                  name: frontend-dist
                  path: dist/
                  retention-days: 1

    # ---------------------------------------------------------------------
    # Matrix builds -- Rust only (frontend pre-built)
    # ---------------------------------------------------------------------
    build-tauri:
        name: ${{ matrix.target }}
        needs: frontend
        environment: desktop-release
        permissions:
            contents: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: ubuntu-22.04
                      target: linux
                      args: ''
                    - platform: windows-latest
                      target: windows
                      args: ''
                    - platform: macos-latest
                      target: macos-arm
                      args: '--target aarch64-apple-darwin'
                    - platform: macos-latest
                      target: macos-intel
                      args: '--target x86_64-apple-darwin'
        runs-on: ${{ matrix.platform }}
        timeout-minutes: 45
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
              with:
                  targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

            - name: Rust cache
              uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
              with:
                  workspaces: src-tauri
                  shared-key: tauri-${{ matrix.target }}
                  save-if: ${{ github.ref_type == 'tag' }}
                  cache-targets: 'true'
                  cache-all-crates: 'true'

            - name: Install Linux dependencies
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

            - name: Download pre-built frontend
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
              with:
                  name: frontend-dist
                  path: dist/

            - name: Generate Tauri icons (if missing)
              run: |
                  if [ ! -d "src-tauri/icons" ] || [ -z "$(ls -A src-tauri/icons 2>/dev/null)" ]; then
                    echo "[WARN] No icons found. Run 'npx tauri icon <source.png>' locally and commit the icons."
                    echo "Using placeholder for CI..."
                    mkdir -p src-tauri/icons
                    node -e "
                      const fs = require('fs');
                      const { Buffer } = require('buffer');
                      const png = Buffer.from('iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==', 'base64');
                      const sizes = ['32x32', '128x128', '128x128@2x'];
                      sizes.forEach(s => fs.writeFileSync('src-tauri/icons/' + s + '.png', png));
                      fs.writeFileSync('src-tauri/icons/icon.ico', png);
                      fs.writeFileSync('src-tauri/icons/icon.icns', png);
                    "
                  fi
              shell: bash

            - name: Build Tauri app
              uses: tauri-apps/tauri-action@fce9c6108b31ea247710505d3aaaa893ee6768d4
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tagName: ${{ github.ref_name }}
                  releaseName: 'CannaGuide ${{ github.ref_name }}'
                  releaseBody: 'Desktop release for CannaGuide 2025'
                  releaseDraft: true
                  prerelease: false
                  args: ${{ matrix.args }}
                  tauriScript: npx tauri

    build-capacitor:
        name: Capacitor bundle
        needs: frontend
        runs-on: ubuntu-latest
        timeout-minutes: 15
        environment: mobile-release
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Setup Node + install dependencies
              uses: ./.github/actions/setup-node-ci
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Download pre-built frontend
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
              with:
                  name: frontend-dist
                  path: dist/

            - name: Capacitor sync check
              run: |
                  if [ -d android ] || [ -d ios ]; then
                    npm run cap:sync
                  else
                    echo "[WARN] No native Capacitor projects are committed yet; uploading the web bundle as the release-ready fallback."
                  fi

            - name: Upload Capacitor-ready bundle
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
              with:
                  name: capacitor-web-bundle
                  path: |
                      dist/
                      capacitor.config.ts
                  retention-days: 14
