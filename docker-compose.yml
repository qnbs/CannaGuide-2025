## ─────────────────────────────────────────────────────────────────────────
## Default: `docker compose up` → Frontend (Vite HMR) + ESP32 + Tauri mock
## Production: `docker compose --profile prod up`
## ─────────────────────────────────────────────────────────────────────────

services:
    # ── Dev Frontend (Vite HMR, default) ────────────────────────────────
    frontend:
        build:
            context: .
            dockerfile: Dockerfile.dev
        ports:
            - '5173:5173'
        volumes:
            - .:/app
            - node_modules:/app/node_modules
        environment:
            - VITE_ESP32_URL=http://localhost:3001
            - VITE_TAURI_MOCK_URL=http://localhost:3002
        restart: unless-stopped
        depends_on:
            esp32-mock:
                condition: service_healthy
            tauri-mock:
                condition: service_healthy
        deploy:
            resources:
                limits:
                    memory: 512M
                    cpus: '1.00'
        healthcheck:
            test: ['CMD', 'wget', '-qO-', 'http://localhost:5173/']
            interval: 15s
            timeout: 5s
            retries: 5
            start_period: 20s

    # ── ESP32 Sensor Mock ───────────────────────────────────────────────
    esp32-mock:
        build:
            context: ./packages/iot-mocks
            dockerfile: Dockerfile
        ports:
            - '3001:3001'
        restart: unless-stopped
        read_only: true
        environment:
            - ESP32_MOCK_PORT=3001
        deploy:
            resources:
                limits:
                    memory: 64M
                    cpus: '0.25'
        healthcheck:
            test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health']
            interval: 15s
            timeout: 3s
            retries: 3
            start_period: 5s

    # ── Tauri IPC Mock ──────────────────────────────────────────────────
    tauri-mock:
        build:
            context: ./docker/tauri-mock
            dockerfile: Dockerfile
        ports:
            - '3002:3002'
        restart: unless-stopped
        read_only: true
        environment:
            - TAURI_MOCK_PORT=3002
        deploy:
            resources:
                limits:
                    memory: 64M
                    cpus: '0.25'
        healthcheck:
            test: ['CMD', 'wget', '-qO-', 'http://localhost:3002/health']
            interval: 15s
            timeout: 3s
            retries: 3
            start_period: 5s

    # ── Production build (nginx) ────────────────────────────────────────
    cannaguide-web:
        profiles: [prod]
        build:
            context: .
            dockerfile: Dockerfile
        ports:
            - '8080:8080'
        restart: unless-stopped
        read_only: true
        tmpfs:
            - /tmp
            - /var/cache/nginx
            - /var/log/nginx
        deploy:
            resources:
                limits:
                    memory: 128M
                    cpus: '0.50'
        healthcheck:
            test: ['CMD', 'wget', '-qO-', 'http://localhost:8080/']
            interval: 30s
            timeout: 3s
            retries: 3
            start_period: 10s

volumes:
    node_modules:
