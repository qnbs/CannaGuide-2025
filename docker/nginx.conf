server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # ── Security headers ──────────────────────────────────────────────────
  add_header Content-Security-Policy "default-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https:; font-src 'self' https://fonts.gstatic.com https: data:; img-src 'self' data: blob: https:; connect-src 'self' https:; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self';" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "accelerometer=(), ambient-light-sensor=(), autoplay=(self), bluetooth=(self), camera=(self), display-capture=(), encrypted-media=(), fullscreen=(self), geolocation=(), magnetometer=(), microphone=(self), midi=(), payment=(), picture-in-picture=(self), publickey-credentials-get=(), screen-wake-lock=(self), usb=(), xr-spatial-tracking=(), gyroscope=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;

  # ── Gzip compression ──────────────────────────────────────────────────
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml application/wasm;
  gzip_vary on;
  gzip_min_length 256;

  # ── SPA fallback ──────────────────────────────────────────────────────
  location / {
    try_files $uri $uri/ /index.html;
  }

  # ── Hashed assets – immutable long-term cache ─────────────────────────
  location /assets/ {
    expires 1y;
    access_log off;
  }

  # ── Service Worker – must never be cached ─────────────────────────────
  location = /sw.js {
    expires -1;
  }

  # ── Web App Manifest – short cache ────────────────────────────────────
  location = /manifest.json {
    expires 1h;
  }
}
