server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # ── Security headers — keep in sync with securityHeaders.ts ─────────
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://generativelanguage.googleapis.com https://api.openai.com https://api.x.ai https://api.anthropic.com https://huggingface.co https://cdn-lfs.huggingface.co https://cdn-lfs.hf.co https://huggingfaceusercontent.com; worker-src 'self' blob:; manifest-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "accelerometer=(), ambient-light-sensor=(), autoplay=(self), bluetooth=(self), camera=(self), display-capture=(), encrypted-media=(), fullscreen=(self), geolocation=(), magnetometer=(), microphone=(self), midi=(), payment=(), picture-in-picture=(self), publickey-credentials-get=(), screen-wake-lock=(self), usb=(), xr-spatial-tracking=(), gyroscope=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;

  # ── Gzip compression ──────────────────────────────────────────────────
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml application/wasm;
  gzip_vary on;
  gzip_min_length 256;

  # ── SPA fallback ──────────────────────────────────────────────────────
  location / {
    try_files $uri $uri/ /index.html;
  }
  # ── index.html — short cache to ensure SW updates propagate ───────
  location = /index.html {
    add_header Cache-Control "no-cache, must-revalidate" always;
  }
  # ── Hashed assets – immutable long-term cache ─────────────────────────
  location /assets/ {
    expires 1y;
    access_log off;
  }

  # ── Service Worker – must never be cached ─────────────────────────────
  location = /sw.js {
    expires -1;
  }

  # ── Web App Manifest – short cache ────────────────────────────────────
  location = /manifest.json {
    expires 1h;
  }
}
