# CannaGuide ESP32 Sensor -- Basic ESPHome Template
#
# Hardware: ESP32-S3 DevKit + BME280/BME680 + Capacitive Soil Moisture
# Protocol: MQTT over WiFi -> CannaGuide PWA (WebSocket subscribe)
#
# Usage:
#   1. Copy this file and secrets.yaml.example to your ESPHome config dir
#   2. Rename secrets.yaml.example to secrets.yaml and fill in your values
#   3. Flash: esphome run basic-sensor.yaml
#
# Topic structure (matches CannaGuide default):
#   cannaguide/sensors/esp32/env -> { temperature, humidity, ph? }

esphome:
    name: cannaguide-sensor
    friendly_name: CannaGuide Sensor
    platform: ESP32
    board: esp32-s3-devkitc-1

wifi:
    ssid: !secret wifi_ssid
    password: !secret wifi_password
    ap:
        ssid: 'cannaguide-sensor-fallback'

mqtt:
    broker: !secret mqtt_broker
    username: !secret mqtt_user
    password: !secret mqtt_pass
    client_id: cannaguide-sensor
    birth_message:
        topic: 'cannaguide/status/cannaguide-sensor'
        payload: 'online'
        qos: 1
        retain: true
    will_message:
        topic: 'cannaguide/status/cannaguide-sensor'
        payload: 'offline'
        qos: 1
        retain: true
    keepalive: 60s

time:
    - platform: sntp
      id: sntp_time
      timezone: Europe/Berlin

# --- Sensors ---

i2c:
    sda: GPIO21
    scl: GPIO22
    scan: true

sensor:
    # BME280: Temperature + Humidity
    - platform: bme280_i2c
      temperature:
          id: air_temp
          name: 'Air Temperature'
          unit_of_measurement: 'C'
          accuracy_decimals: 1
      humidity:
          id: air_humidity
          name: 'Air Humidity'
          unit_of_measurement: '%'
          accuracy_decimals: 0
      pressure:
          id: air_pressure
          name: 'Air Pressure'
          unit_of_measurement: 'hPa'
      address: 0x76
      update_interval: 10s

    # VPD calculation (Tetens/Magnus, +3C leaf offset)
    - platform: template
      id: vpd_sensor
      name: 'VPD'
      unit_of_measurement: 'kPa'
      accuracy_decimals: 2
      update_interval: 10s
      lambda: |-
          float t = id(air_temp).state;
          float rh = id(air_humidity).state;
          if (isnan(t) || isnan(rh)) return NAN;
          float svp = 0.61078f * expf(17.2694f * t / (t + 238.3f));
          float leaf_temp = t + 3.0f;
          float leaf_svp = 0.61078f * expf(17.2694f * leaf_temp / (leaf_temp + 238.3f));
          float vpd = leaf_svp - (svp * (rh / 100.0f));
          return (vpd < 0.0f) ? 0.0f : vpd;

    # Capacitive soil moisture sensor
    - platform: adc
      id: soil_moisture
      name: 'Soil Moisture'
      pin: GPIO34
      unit_of_measurement: '%'
      accuracy_decimals: 0
      update_interval: 30s
      filters:
          - calibrate_linear:
                - 2.8 -> 0
                - 1.2 -> 100

# --- Telemetry publish (every 10s as JSON) ---

interval:
    - interval: 10s
      then:
          - mqtt.publish_json:
                topic: 'cannaguide/sensors/cannaguide-sensor/env'
                qos: 1
                retain: false
                payload: |-
                    root["temperature"] = id(air_temp).state;
                    root["humidity"] = id(air_humidity).state;
                    root["vpd"] = id(vpd_sensor).state;
                    root["soilMoisture"] = id(soil_moisture).state;
                    root["timestamp"] = id(sntp_time).now().timestamp;

# --- OTA + Logging ---

ota:
    - platform: esphome
      password: !secret ota_password

logger:
    level: WARN
