# SonarCloud Configuration for CannaGuide 2025
# Docs: https://docs.sonarsource.com/sonarcloud/advanced-setup/analysis-parameters/

sonar.projectKey=qnbs_CannaGuide-2025
sonar.organization=qnbs

# Source configuration — tests live alongside source files
sonar.sources=components,hooks,lib,services,stores,utils,workers,data,types
sonar.tests=tests,components,hooks,lib,services,stores,utils,workers
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.fuzz.test.ts,**/*.e2e.ts,**/*.ct.tsx,tests/**

# TypeScript / JavaScript
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPaths=tsconfig.json

# Exclusions (build artifacts, generated, vendor)
sonar.exclusions=\
  dist/**,\
  node_modules/**,\
  coverage/**,\
  .stryker-tmp/**,\
  test-results/**,\
  public/sw.js,\
  src-tauri/target/**,\
  apps/desktop/target/**,\
  packages/iot-mocks/node_modules/**,\
  data/strains/*.json,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.fuzz.test.ts,\
  tests/**

# Duplicate detection exclusions (data files with intentional repetition)
sonar.cpd.exclusions=\
  data/strains.ts,\
  data/strains/**,\
  locales/**

# Coverage exclusions (static data, types, workers — not meaningfully testable)
sonar.coverage.exclusions=\
  data/**,\
  types/**,\
  workers/**,\
  locales/**,\
  public/**
